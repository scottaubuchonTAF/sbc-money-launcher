/* ============================ Reports (v3.21) ============================
 * Full Reports section: date range + presets, granularity, per-report controls,
 * group/account filters, compare-to-previous, and working CSV export. Server
 * data comes from apiReport; display-only controls (chart type, top-N, donut/bar,
 * group-by, net line) transform the already-fetched payload with no round-trip. */
var RPT_META = {
  spend: {title:'Spending over time', icon:'📈', desc:'How much you spend each period, with the trend.', gran:true, compare:true, controls:['type']},
  areas: {title:'Where your money goes', icon:'🍩', desc:'Top spending categories over the selected range.', gran:false, compare:false, controls:['topN','view','groupBy']},
  inout: {title:'Income vs spending', icon:'⚖️', desc:'Money in vs out each period, with the net.', gran:true, compare:true, controls:['net']},
  worth: {title:'Net worth over time', icon:'🏦', desc:'Assets minus liabilities across your accounts.', gran:true, compare:true, controls:[]}
};
var RPT_GRANS=[['day','Day'],['week','Week'],['month','Month'],['quarter','Quarter'],['year','Year']];
var RPT_PRESETS=[['30D',30],['3M',91],['6M',182],['12M',365],['YTD','ytd'],['All',1825]];
var rptChart=null;
var RTEAL='#0d9488', RTEALL='#5eead4', RLINE='#e8edf2', RINK3='#94a3b8';

function rptPad(n){ return (n<10?'0':'')+n; }
function rptISO(d){ return d.getFullYear()+'-'+rptPad(d.getMonth()+1)+'-'+rptPad(d.getDate()); }
function rptParse(s){ var p=String(s||'').split('-'); return new Date(+p[0],(+p[1]||1)-1,+p[2]||1); }
function rptToday(){ var d=new Date(); d.setHours(0,0,0,0); return d; }
function rptSave(){ try{ localStorage.setItem('sbcReport', JSON.stringify(state.report)); }catch(e){} }
function rptEnsureRange(){ var r=state.report;
  if(!r.to) r.to=rptISO(rptToday());
  if(!r.from){ var f=rptToday(); f.setDate(f.getDate()-364); r.from=rptISO(f); } }
function rptRangeDays(){ return Math.round((rptParse(state.report.to)-rptParse(state.report.from))/86400000)+1; }
function rptAutoGran(){ var d=rptRangeDays(); state.report.gran = d<=45?'day':d<=120?'week':d<=550?'month':'quarter'; }
function rptGranDisabled(g){ var d=rptRangeDays(); return (g==='day'&&d>120)||(g==='week'&&d>550)||(g==='year'&&d<365); }
function rptApplyPreset(p){ var r=state.report; r.to=rptISO(rptToday());
  if(p==='ytd'){ r.from=rptISO(new Date(new Date().getFullYear(),0,1)); }
  else { var f=rptToday(); f.setDate(f.getDate()-(Number(p)-1)); r.from=rptISO(f); }
  rptAutoGran(); }
function rptActivePreset(){ var r=state.report; if(r.to!==rptISO(rptToday())) return null;
  var f=rptParse(r.from);
  if(f.getFullYear()===new Date().getFullYear()&&f.getMonth()===0&&f.getDate()===1) return 'YTD';
  return {30:'30D',91:'3M',182:'6M',365:'12M',1825:'All'}[rptRangeDays()]||null; }
function rptSig(){ var r=state.report; return JSON.stringify([r.id,r.from,r.to,r.gran,r.compare,r.envelopeIds,r.groups,r.accounts]); }
function rptAxis(legend,o){ o=o||{}; return {maintainAspectRatio:false,animation:false,
  plugins:{legend:legend?{position:'top',labels:{boxWidth:12,color:RINK3,font:{size:12}}}:{display:false}},
  scales:{x:{grid:{display:false},ticks:{color:RINK3,font:{size:11},maxRotation:0,autoSkip:true,maxTicksLimit:14}},
    y:{grid:{color:RLINE},ticks:{color:RINK3,font:{size:11},callback:function(v){return '$'+Math.round(v/1000)+'k';}},beginAtZero:o.zero!==false}}}; }

function rptFetch(){
  var r=state.report, sig=rptSig();
  var opts={ report:r.id, from:r.from, to:r.to, gran:r.gran, compare:!!(r.compare&&RPT_META[r.id].compare!==false),
    filters:{ envelopeIds:r.envelopeIds, groups:r.groups, accounts:r.accounts } };
  state.reportLoading=true; state.reportErr=null;
  run('apiReport', opts).then(function(res){
    res._sig=sig; state.reportData=res; state.reportLoading=false; state.reportErrSig=null;
    if(state.view==='reports') renderReports();
  }).catch(function(e){ state.reportLoading=false; state.reportErr=(e&&e.message)||String(e);
    // v3.22: remember WHICH request failed — without this, renderReports saw
    // needFetch=true (sig only stored on success) and refetched immediately,
    // an INFINITE retry loop hammering the backend on every report error.
    state.reportErrSig=sig;
    if(state.view==='reports') renderReports(); });
}

function rptSeg(key,opts){ var r=state.report;
  return '<span class="rptseg">'+opts.map(function(o){
    return '<button data-act="rpt-ctl" data-arg="'+key+'|'+o[0]+'" class="'+(String(r[key])===String(o[0])?'on':'')+'">'+o[1]+'</button>'; }).join('')+'</span>'; }
function rptControlsHtml(meta){ var r=state.report; if(!meta.controls.length) return '';
  var h='<div class="rptfilters" style="border-top:1px solid var(--line);margin-top:12px;padding-top:12px">';
  meta.controls.forEach(function(c){
    if(c==='type') h+='<span class="flab">Chart</span>'+rptSeg('chartType',[['area','Area'],['bar','Bars']]);
    else if(c==='view') h+='<span class="flab">View</span>'+rptSeg('view',[['donut','Donut'],['bar','Bars']]);
    else if(c==='groupBy') h+='<span class="flab" style="margin-left:8px">Group by</span>'+rptSeg('groupBy',[['envelope','Envelope'],['group','Group']]);
    else if(c==='topN') h+='<span class="flab" style="margin-left:8px">Top <span class="rangeval" id="rptTopNval">'+r.topN+'</span></span><input type="range" id="rptTopN" min="3" max="12" value="'+r.topN+'" style="width:140px;accent-color:var(--teal-600)">';
    else if(c==='net') h+='<label class="rpttoggle" style="margin-left:8px"><input type="checkbox" id="rptNet"'+(r.showNet?' checked':'')+'> Show net line</label>';
  });
  return h+'</div>'; }
function rptFiltersHtml(){ var d=state.reportData, r=state.report; if(!d||!d.meta) return '';
  var groups=d.meta.groups||[], accts=d.meta.accounts||[];
  if(!groups.length && !accts.length) return '';
  var h='<div class="rptfilters">';
  if(groups.length){ h+='<span class="flab">Groups</span>'+groups.map(function(g){
    return '<button class="rptchip'+(r.groups.indexOf(g)!==-1?' on':'')+'" data-act="rpt-fgroup" data-arg="'+esc(g)+'">'+esc(g)+'</button>'; }).join(''); }
  if(accts.length){ h+='<span class="flab" style="margin-left:8px">Accounts</span>'+accts.map(function(a){
    return '<button class="rptchip'+(r.accounts.indexOf(a)!==-1?' on':'')+'" data-act="rpt-facct" data-arg="'+esc(a)+'">'+esc(a)+'</button>'; }).join(''); }
  if(r.groups.length||r.accounts.length) h+='<button class="rptchip" data-act="rpt-fclear" style="margin-left:8px">Clear filters</button>';
  return h+'</div>'; }

function renderReports(){
  rptEnsureRange();
  var r=state.report, meta=RPT_META[r.id]||(r.id='spend',RPT_META.spend);
  // v3.22: a failed request must NOT auto-refetch the same sig (infinite loop);
  // changing any control changes the sig and fetches fresh, or use Retry.
  var sameErr = state.reportErr && state.reportErrSig===rptSig();
  var needFetch = (!state.reportData || state.reportData._sig!==rptSig()) && !sameErr;
  if(needFetch && !state.reportLoading) rptFetch();
  var side='<div class="rptside"><h3>Reports</h3><div class="rptlist">'+
    Object.keys(RPT_META).map(function(id){ var m=RPT_META[id];
      return '<button data-act="rpt-select" data-arg="'+id+'" class="'+(id===r.id?'on':'')+'"><span class="ic">'+m.icon+'</span>'+esc(m.title)+'</button>'; }).join('')+
    '</div></div>';
  var head='<div class="rpthead"><div><h2>'+esc(meta.title)+'</h2><div class="desc">'+esc(meta.desc)+'</div></div>'+
    '<button class="exp" data-act="rpt-export">⤓ Export CSV</button></div>';
  var bar='<div class="rptbar">'+
    '<div class="rptctl"><span class="lb">Date range</span><div class="rptdates">'+
      '<input type="date" id="rptFrom" value="'+r.from+'"><span>→</span><input type="date" id="rptTo" value="'+r.to+'"></div></div>'+
    '<div class="rptctl"><span class="lb">Quick presets</span><div class="rptpresets">'+
      RPT_PRESETS.map(function(p){ return '<button data-act="rpt-preset" data-arg="'+p[1]+'" class="'+(rptActivePreset()===p[0]?'on':'')+'">'+p[0]+'</button>'; }).join('')+'</div></div>'+
    (meta.gran!==false?('<div class="rptctl"><span class="lb">Granularity</span><div class="rptseg">'+
      RPT_GRANS.map(function(g){ var dis=rptGranDisabled(g[0]); return '<button data-act="rpt-gran" data-arg="'+g[0]+'"'+(dis?' disabled':'')+' class="'+(r.gran===g[0]?'on':'')+'">'+g[1]+'</button>'; }).join('')+'</div></div>'):'')+
    (meta.compare!==false?('<label class="rpttoggle"><input type="checkbox" id="rptCompare"'+(r.compare?' checked':'')+'> Compare to previous period</label>'):'')+
    '</div>';
  var body;
  if(state.reportErr) body='<div class="empty">⚠ '+esc(state.reportErr)+
    '<div style="margin-top:10px"><button class="btn sm" data-act="rpt-retry">Try again</button></div></div>';
  else if(needFetch || !state.reportData) body='<div class="spin"></div>';
  else body='<div class="rptchartbox"><canvas id="rptCanvas"></canvas></div><div class="rptstats" id="rptStats"></div>';
  $('#shell').innerHTML='<div class="rptlayout">'+side+'<div class="rptpanel">'+head+bar+rptControlsHtml(meta)+rptFiltersHtml()+body+'</div></div>';
  // v3.22: manual date edits re-derive granularity when the current one is no
  // longer valid for the range (a persisted gran:'day' over 5 years previously
  // stayed active and produced huge/slow apiReport requests).
  var fEl=$('#rptFrom'); if(fEl) fEl.addEventListener('change',function(){ state.report.from=this.value; if(rptParse(state.report.from)>rptParse(state.report.to)) state.report.to=state.report.from; if(rptGranDisabled(state.report.gran)) rptAutoGran(); rptSave(); renderReports(); });
  var tEl=$('#rptTo'); if(tEl) tEl.addEventListener('change',function(){ state.report.to=this.value; if(rptParse(state.report.to)<rptParse(state.report.from)) state.report.from=state.report.to; if(rptGranDisabled(state.report.gran)) rptAutoGran(); rptSave(); renderReports(); });
  var cEl=$('#rptCompare'); if(cEl) cEl.addEventListener('change',function(){ state.report.compare=this.checked; rptSave(); renderReports(); });
  var nEl=$('#rptNet'); if(nEl) nEl.onchange=function(){ state.report.showNet=nEl.checked; rptSave(); drawReportChart(); };
  var tn=$('#rptTopN'); if(tn) tn.oninput=function(){ state.report.topN=Number(tn.value); var l=$('#rptTopNval'); if(l) l.textContent=state.report.topN; rptSave(); drawReportChart(); };
  if(!needFetch && state.reportData && !state.reportErr) drawReportChart();
}
function rptStats(arr){ var el=$('#rptStats'); if(!el) return;
  el.innerHTML=arr.map(function(s){ return '<div class="s"><div class="k">'+esc(s[0])+'</div><div class="v'+(s[2]?' '+s[2]:'')+'">'+esc(s[1])+'</div></div>'; }).join(''); }
function drawReportChart(){
  var cv=$('#rptCanvas'); if(!cv) return;
  if(typeof Chart==='undefined'){ var bx=$('.rptchartbox'); if(bx) bx.innerHTML='<div class="empty">Chart unavailable — reload the page.</div>'; return; }
  if(rptChart){ try{rptChart.destroy();}catch(e){} rptChart=null; }
  var r=state.report, d=state.reportData;
  if(r.id==='areas'){
    var src=(r.groupBy==='group')?(d.groups||[]):(d.rows||[]);
    var rows=src.slice().sort(function(a,b){return b.spent-a.spent;}).slice(0,r.topN);
    var lab=rows.map(function(x){return x.name;}), data=rows.map(function(x){return x.spent;});
    var pal=['#0f766e','#0d9488','#14b8a6','#5eead4','#99f6e4','#2dd4bf','#115e59','#ccfbf1','#5eead4','#0d9488','#14b8a6','#99f6e4'];
    if(!rows.length){ var b0=$('.rptchartbox'); if(b0) b0.innerHTML='<div class="empty">No spending in this range.</div>'; rptStats([]); return; }
    if(r.view==='donut') rptChart=new Chart(cv,{type:'doughnut',data:{labels:lab,datasets:[{data:data,backgroundColor:pal,borderWidth:0}]},
      options:{maintainAspectRatio:false,animation:false,cutout:'58%',plugins:{legend:{position:'right',labels:{boxWidth:12,color:RINK3,font:{size:12}}}}}});
    else rptChart=new Chart(cv,{type:'bar',data:{labels:lab,datasets:[{data:data,backgroundColor:RTEAL,borderRadius:5}]},options:Object.assign(rptAxis(false),{indexAxis:'y'})});
    var st=d.stats||{};
    rptStats([['Range',rptRangeDays()+' days'],['Top category',st.top||'—'],['Top amount',money(st.topAmt||0)],['Categories',String(st.count||0)]]);
    return;
  }
  if(r.id==='worth'){
    if(d.noData){ var bw=$('.rptchartbox'); if(bw) bw.innerHTML='<div class="empty">No balance snapshots yet — net-worth history builds as the daily snapshot runs.</div>'; rptStats([]); return; }
    var b=d.buckets||[]; var lab=b.map(function(x){return x.label;}), data=b.map(function(x){return x.nw;});
    var ds=[{label:'Net worth',data:data,borderColor:RTEAL,backgroundColor:'rgba(13,148,136,.10)',fill:true,tension:.3,borderWidth:2.5,pointRadius:0}];
    if(r.compare && d.compareBuckets) ds.push({label:'Previous ('+(d.compareLabel||'prev')+')',data:d.compareBuckets.map(function(x){return x.nw;}),borderColor:RINK3,borderDash:[5,4],borderWidth:2,pointRadius:0,fill:false,tension:.3});
    rptChart=new Chart(cv,{type:'line',data:{labels:lab,datasets:ds},options:rptAxis(!!r.compare,{zero:false})});
    var s=d.stats||{}; rptStats([['Current',money(s.current||0)],['Start of range',money(s.start||0)],['Change',money(s.change||0),(s.change||0)>=0?'pos':'neg'],['Buckets',String(s.buckets||0)]]);
    return;
  }
  if(r.id==='inout'){
    var b=d.buckets||[]; var lab=b.map(function(x){return x.label;}), inc=b.map(function(x){return x.income;}), sp=b.map(function(x){return x.spend;});
    var ds=[{label:'Income',data:inc,backgroundColor:RTEAL,borderRadius:4,type:'bar'},{label:'Spending',data:sp,backgroundColor:RTEALL,borderRadius:4,type:'bar'}];
    if(r.showNet) ds.push({label:'Net',type:'line',data:inc.map(function(v,i){return v-sp[i];}),borderColor:'#0f766e',borderWidth:2.5,pointRadius:0,tension:.3});
    if(r.compare && d.compareBuckets) ds.push({label:'Prev net',type:'line',data:d.compareBuckets.map(function(x){return x.income-x.spend;}),borderColor:RINK3,borderDash:[5,4],borderWidth:2,pointRadius:0,tension:.3});
    rptChart=new Chart(cv,{type:'bar',data:{labels:lab,datasets:ds},options:rptAxis(true)});
    var s2=d.stats||{}; rptStats([['Total income',money(s2.totalIncome||0)],['Total spending',money(s2.totalSpend||0)],['Net',money(s2.net||0),(s2.net||0)>=0?'pos':'neg'],['Buckets',String(s2.buckets||0)]]);
    return;
  }
  // spend (default)
  var b=d.buckets||[]; var lab=b.map(function(x){return x.label;}), data=b.map(function(x){return x.spend;});
  var area=(r.chartType!=='bar');
  var ds=[{label:'Spending',data:data,borderColor:RTEAL,backgroundColor:area?'rgba(13,148,136,.12)':RTEAL,fill:area,tension:.32,borderWidth:2.5,pointRadius:0,borderRadius:4,type:area?'line':'bar'}];
  if(r.compare && d.compareBuckets) ds.push({label:'Previous ('+(d.compareLabel||'prev')+')',data:d.compareBuckets.map(function(x){return x.spend;}),borderColor:RINK3,borderDash:[5,4],borderWidth:2,pointRadius:0,fill:false,tension:.32,type:'line'});
  rptChart=new Chart(cv,{type:area?'line':'bar',data:{labels:lab,datasets:ds},options:rptAxis(!!r.compare)});
  var tot=data.reduce(function(a,c){return a+c;},0), avg=data.length?tot/data.length:0;
  rptStats([['Total',money(tot)],['Per '+r.gran,money(avg)],['Highest',money(Math.max.apply(null,data.concat(0)))],['Buckets',String(data.length)]]);
}
function rptExport(){
  var r=state.report, d=state.reportData; if(!d){ toast('Nothing to export yet.'); return; }
  var rows=[];
  if(r.id==='areas'){ rows.push(['Category','Group','Spent']); (d.rows||[]).forEach(function(x){ rows.push([x.name,x.group,x.spent]); }); }
  else if(r.id==='worth'){ rows.push(['Period','Net worth']); (d.buckets||[]).forEach(function(x){ rows.push([x.label,x.nw]); }); }
  else if(r.id==='inout'){ rows.push(['Period','Income','Spending','Net']); (d.buckets||[]).forEach(function(x){ rows.push([x.label,x.income,x.spend,Math.round((x.income-x.spend)*100)/100]); }); }
  else { rows.push(['Period','Spending']); (d.buckets||[]).forEach(function(x){ rows.push([x.label,x.spend]); }); }
  var csv=rows.map(function(row){ return row.map(function(c){ var s=String(c==null?'':c); return /[",\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s; }).join(','); }).join('\n');
  var blob=new Blob([csv],{type:'text/csv;charset=utf-8'}), url=URL.createObjectURL(blob);
  var a=document.createElement('a'); a.href=url; a.download='sbc-'+r.id+'-'+r.from+'-to-'+r.to+'.csv';
  document.body.appendChild(a); a.click(); setTimeout(function(){ document.body.removeChild(a); URL.revokeObjectURL(url); },120);
}

/* ============================ display density (v3.28) ============================
   Per-user UI density, synced via apiGet/SetDensity (Settings key "Density <email>",
   mirrors the Dashboard Layout pattern). localStorage 'sbcDensity' for instant paint.
   applyDensity sets <body data-d>; the CSS override blocks do the rest. */
var DENSITY_OPTS = [['comfortable','Comfortable'],['mid','Midpoint'],['compact','Compact']];
function densityLabel(v){ for(var i=0;i<DENSITY_OPTS.length;i++){ if(DENSITY_OPTS[i][0]===v) return DENSITY_OPTS[i][1]; } return 'Midpoint'; }
function applyDensity(v, save){
  if(['comfortable','mid','compact'].indexOf(v)===-1) v='mid';
  state.density = v;
  document.body.setAttribute('data-d', v);
  try{ localStorage.setItem('sbcDensity', v); }catch(e){}
  if(save){
    toast('Density: '+densityLabel(v));
    run('apiSetDensity',{value:v}).catch(function(e){ console.warn('save density:', e&&e.message||e); });
    if(state.view==='settings' || state.view==='more') renderSettings();
  }
}
function densityControl(){
  var cur = state.density || 'mid';
  var btns = DENSITY_OPTS.map(function(o){
    return '<button class="densbtn'+(cur===o[0]?' on':'')+'" data-act="density" data-arg="'+o[0]+'">'+o[1]+'</button>';
  }).join('');
  return settingsSectionLabel('DISPLAY DENSITY')+
    '<div class="card" style="padding:12px">'+
    '<div class="densgrp">'+btns+'</div>'+
    '<div class="empty" style="padding:8px 2px 0;font-size:11.5px;text-align:left">How tightly information is packed on screen. Midpoint is the default; Compact fits the most at once. Saved to your account.</div>'+
    '</div>';
}
function renderSettings(){

function reconciledMap(){ try{ return JSON.parse(localStorage.getItem('sbcReconciled')||'{}'); }catch(e){ return {}; } }
function renderReconcile(){
  if(!state.reconcile){ $('#shell').innerHTML='<h2 class="viewtitle">Reconcile accounts</h2><div class="spin"></div>'; }
  else { drawReconcile(); }
  run('apiReconcile').then(function(r){
    if(Object.keys(state.baledit||{}).length) return; // don't clobber an in-progress edit
    state.reconcile=r; if(state.view==='reconcile') drawReconcile();
  }).catch(function(e){ if(!state.reconcile) fail(e); });
  // v3.15: feed-lag check (balance feed vs transactions). On-demand compute;
  // also refreshes the cached summary the dashboard reads.
  run('apiFeedLag').then(function(f){
    state.feedlag=f; if(state.view==='reconcile' && !Object.keys(state.baledit||{}).length) drawReconcile();
  }).catch(function(){});
}
function feedLagPanel(){
  var f = state.feedlag; if(!f) return '';

    return settingsSectionLabel('📡 FEED CHECK')+'<div class="card"><div class="empty" style="padding:12px;text-align:left">'+
      '✓ All balance feeds are in sync with their transactions (last '+(f.windowDays||35)+' days).</div></div>';

function reconRow(a, rev){

  h += '<button class="btn ghost sm" data-act="recon-manual" data-arg="'+esc(a.name)+'">'+(a.manual?'✓ Manual':'Mark manual')+'</button>';

function drawReconcile(){
  var r = state.reconcile, rev = reconciledMap();

  var auto    = (r.accounts||[]).filter(function(a){ return !a.manual && !a.dormant; });
  var dormant = (r.accounts||[]).filter(function(a){ return a.dormant; });

    '<div class="empty" style="padding:2px 0 12px;text-align:left">Check each account against your bank. '+
    '<b>Manual</b> accounts (dead/no feed — e.g. CC Rewards, HSA) you update by hand with <b>Update balance</b>, '+
    'which writes back to Tiller so both stay in sync. <b>Automatic</b> accounts come from the feed — just review. '+
    'No feed for over 6 months → Closed / Dormant.</div>';

  if(manual.length) manual.forEach(function(a){ h += reconRow(a, rev); });
  else h += '<div class="empty" style="padding:12px;text-align:left">None yet — tap “Mark manual” on a fed account below to move it here.</div>';
  h += '</div>';

      h += '<div class="card">';
      dormant.forEach(function(a){ h += reconRow(a, rev); });

function reconUpdate(account){ state.baledit = { account: account }; drawReconcile();
  var el=$('#balInput'); if(el){ el.focus(); el.select(); } }
function reconCancel(){ state.baledit = null; drawReconcile(); }
function reconSave(account){
  var el=$('#balInput'); if(!el) return;
  var v=el.value;
  if(v===''||isNaN(Number(v))){ toast('Enter a number'); return; }
  var amt=Number(v);
  var btn=document.querySelector('[data-act="recon-save"]');
  if(btn){ btn.disabled=true; btn.textContent='Saving…'; }
  // v3.15.1: update the UI immediately and write to Tiller in the BACKGROUND.
  // The Tiller write is slow (opening the workbook + Google recalculating Net
  // Worth / Cash Flow / Retirement tabs that reference Balance History), so we
  // don't make the user wait on it. Patch locally, then confirm/revert by toast.
  var a=(state.reconcile&&state.reconcile.accounts||[]).find(function(x){return x.name===account;});
  var prev = a ? {balance:a.balance,days:a.days,updated:a.updated,dormant:a.dormant} : null;
  if(a){ a.balance=amt; a.days=0; a.updated='today'; a.dormant=false; }
  state.baledit=null; state.balances=null; invalidateData();
  drawReconcile();
  toast('Saving '+account+' to Tiller…');
  run('apiManualBalance', { account:account, balance:amt }).then(function(){
    toast('✓ '+account+' updated · Tiller');
  }).catch(function(e){
    if(a&&prev){ a.balance=prev.balance; a.days=prev.days; a.updated=prev.updated; a.dormant=prev.dormant; state.balances=null; drawReconcile(); }
    toast('⚠ Save failed: '+(e.message||e));
  });
}
function reconReviewed(account){
  var m = reconciledMap();
  m[account] = new Date().toLocaleDateString();
  try{ localStorage.setItem('sbcReconciled', JSON.stringify(m)); }catch(e){}
  toast('Marked reviewed ✓'); drawReconcile();
}
function snapshotToTiller(){
  var btn=document.querySelector('[data-act="snapshot-tiller"]');
  if(btn){ btn.disabled=true; btn.textContent='Backing up…'; }
  run('apiSnapshotEnvelopesToTiller').then(function(r){
    toast('Backed up '+r.count+' envelopes to Tiller ✓');

function pickListHtml(q){
  q = String(q||'').toLowerCase();
  var items = state.picker.filter(function(e){
    return !q || e.name.toLowerCase().indexOf(q)!==-1 || e.group.toLowerCase().indexOf(q)!==-1;
  }).slice(0,80);
  return items.map(function(e){
    return '<button data-act="picker-pick" data-arg="'+esc(e.id)+'"><span>'+esc(e.name)+
      '</span><span class="g">'+esc(e.group)+'</span></button>';
  }).join('') || '<button disabled>No matches</button>';
}
function closePicker(){ $('#ovl').innerHTML=''; state.pickCtx=null; }
function pickerPicked(envId){
  var c = state.pickCtx;
  closePicker();
  if(!c) return;
  if(c.kind==='sel'){
    state.sel[c.key]=envId; drawInbox();
  } else if(c.kind==='planline'){
    planFormCapture();
    state.planEdit.lines[c.idx].envelopeId = envId; drawPlans();
  } else if(c.kind==='moveto'){
    if(state.move){ state.move.toId = envId; renderEnvDetail(); }
  } else if(c.kind==='regenv'){
    state.register.envelope = envId; renderTxns();
  } else {
    var kind = c.kind.replace(/line$/,'');
    var lines = splitLinesOf(kind, c.key);
    if(lines[c.idx]) lines[c.idx].envelopeId = envId;
    redrawFor(kind);
  }
}

/* ============================ event delegation ============================ */
document.addEventListener('click', function(ev){
  var el = ev.target.closest('[data-act]');
  if(!el){
    if(ev.target.classList && ev.target.classList.contains('ovl')) closePicker();
    return;
  }
  var act = el.dataset.act, arg = el.dataset.arg || '';
  var p = arg.split('|');
  switch(act){
    case 'goview': go(arg); break;
    case 'density': applyDensity(arg, true); break;
    case 'goreport': state.report.id=arg; rptSave(); go('reports'); break;
    case 'rpt-select': state.report.id=arg; rptSave(); renderReports(); break;
    case 'rpt-preset': rptApplyPreset(arg==='ytd'?'ytd':Number(arg)); rptSave(); renderReports(); break;
    case 'rpt-gran': if(!el.disabled){ state.report.gran=arg; rptSave(); renderReports(); } break;
    case 'rpt-ctl': state.report[p[0]]=isNaN(p[1])?p[1]:Number(p[1]); rptSave(); renderReports(); break;
    case 'rpt-fgroup': (function(){ var i=state.report.groups.indexOf(arg); if(i===-1) state.report.groups.push(arg); else state.report.groups.splice(i,1); rptSave(); renderReports(); })(); break;
    case 'rpt-facct': (function(){ var i=state.report.accounts.indexOf(arg); if(i===-1) state.report.accounts.push(arg); else state.report.accounts.splice(i,1); rptSave(); renderReports(); })(); break;
    case 'rpt-fclear': state.report.groups=[]; state.report.accounts=[]; state.report.envelopeIds=[]; rptSave(); renderReports(); break;
    case 'rpt-export': rptExport(); break;
    case 'rpt-retry': state.reportErr=null; state.reportErrSig=null; renderReports(); break; // v3.22
    case 'home-customize': state.homeCustomize=!state.homeCustomize; renderDash(); break;
    case 'home-cust-close': if(ev.target===el){ state.homeCustomize=false; renderDash(); } break;
    case 'home-toggle': (function(){ var st=homeState();
        if(st.visible[arg]) delete st.visible[arg]; else st.visible[arg]=1;
        homeSave(st); renderDash(); })(); break;
    case 'home-move': homeMove_(p[0], p[1]); break;
    case 'approve': approve(arg); break;
    case 'approve-all': approveAll(); break;
    case 'approve-split': approveSplit(arg); break;
    case 'pick-sel': state.sel[p[0]]=p[1]; drawInbox(); break;
    case 'split-on':
      state.split[arg] = { on:true, lines:[
        {envelopeId: state.sel[arg]||
          ((state.inbox.find(function(t){return t.txnId===arg;})||{}).suggestedId)||'', amount:''},
        {envelopeId:'', amount:''} ] };
      drawInbox(); break;
    case 'split-off': delete state.split[arg]; drawInbox(); break;
    case 'split-add': splitLinesOf(p[0],p[1]).push({envelopeId:'',amount:''}); redrawFor(p[0]); break;
    case 'split-rm':
      var ls = splitLinesOf(p[0],p[1]); ls.splice(Number(p[2]),1);
      if(!ls.length) ls.push({envelopeId:'',amount:''});
      redrawFor(p[0]); break;
    case 'open-picker': openPicker({kind:p[0], key:p[1], idx:Number(p[2]||0)}); break;
    case 'picker-pick': pickerPicked(arg); break;
    case 'picker-close': if(ev.target===el) closePicker(); break;
    case 'confirm-yes': closeConfirm(true); break;
    case 'confirm-cancel': closeConfirm(false); break;
    case 'confirm-no': if(ev.target===el) closeConfirm(false); break;
    case 'fund-this': go('fund'); break;
    case 'fund-plan': fundStart(p[0], p[1]); break;
    case 'fund-manual': fundStart(p[0], null); break;
    case 'fund-cancel': delete state.fund[arg]; drawFund(); break;
    case 'fund-go': fundGo(arg); break;
    case 'plan-new':
      state.planEdit = {planId:'', name:'', mode:'fixed', incomeMatch:'', active:true,
        lines:[{envelopeId:'',fixed:'',percent:'',remainder:false}]};
      drawPlans(); break;
    case 'plan-tiller': planFromTiller(); break;
    case 'plans-section':
      state.plansOpen = !state.plansOpen; drawFund(); break;
    case 'plan-open':
      state.planOpen = state.planOpen || {};
      state.planOpen[arg] = !state.planOpen[arg];
      drawPlans(); break;
    case 'plan-versions':
      state.showVersions = !state.showVersions; drawPlans(); break;
    case 'plan-edit':
      var pl = state.plans.find(function(x){return x.planId===arg;});
      state.planEdit = JSON.parse(JSON.stringify(pl));
      drawPlans(); break;
    case 'plan-dup':
      var pd = state.plans.find(function(x){return x.planId===arg;});
      if(pd){ state.planEdit = JSON.parse(JSON.stringify(pd));
        state.planEdit.planId=''; state.planEdit.active=true;
        state.planEdit.name = pd.name + ' (copy)';
        drawPlans(); }
      break;
    case 'plan-restore':
      var pv = state.plans.find(function(x){return x.planId===arg;});
      if(pv){ state.planEdit = JSON.parse(JSON.stringify(pv));
        state.planEdit.planId=''; state.planEdit.active=true;
        state.planEdit.name = pv.name.replace(/\s+—\s+saved\s+.*$/, '');
        drawPlans(); }
      break;
    case 'plan-cancel': state.planEdit=null; drawPlans(); break;
    case 'plan-save': planSave(); break;
    case 'plan-add': planFormCapture();
      state.planEdit.lines.push({envelopeId:'',fixed:'',percent:'',remainder:false});
      drawPlans(); break;
    case 'plan-rm': planFormCapture(); state.planEdit.lines.splice(Number(arg),1);
      if(!state.planEdit.lines.length) state.planEdit.lines.push({envelopeId:'',fixed:'',percent:'',remainder:false});
      drawPlans(); break;
    case 'plan-rem': planFormCapture();
      state.planEdit.lines.forEach(function(l,i){ l.remainder = (i===Number(arg)) && el.checked; });
      drawPlans(); break;
    case 'plan-off': planToggle(arg, false); break;
    case 'plan-on': planToggle(arg, true); break;
    case 'reg-search': state.register.q = $('#regQ').value; state.register.limit=50; renderTxns(); break;
    case 'reg-more': state.register.limit = (state.register.limit||50)+100; renderTxns(true); break;
    case 'reg-all': state.register.limit = 1000000; toast('Loading all transactions…'); renderTxns(true); break;
    case 'reg-env-clear': state.register.envelope=''; state.register.limit=50; renderTxns(); break;
    case 'reg-hidden': state.register.includeHidden = !state.register.includeHidden; state.register.limit=50; renderTxns(); break;
    case 'reg-clear': state.register.q=''; state.register.account=''; state.register.envelope='';
      state.register.includeHidden=false; state.register.limit=50; renderTxns(); break;
    case 'grp-toggle':
      state.envOpen[arg] = state.envOpen[arg]===false ? true : false;
      try{ localStorage.setItem('sbcEnvOpen', JSON.stringify(state.envOpen)); }catch(e2){}
      renderEnvelopes(); break;
    case 'env-open': openEnvelope(arg); break;
    case 'env-back': go('envelopes'); break;
    case 'env-new': state.envNew={name:'',group:'',type:'Expense'}; renderEnvelopes(); break;
    case 'env-new-cancel': state.envNew=null; renderEnvelopes(); break;
    case 'env-new-save': envNewSave(); break;
    case 'env-show-archived': state.showArchived=!state.showArchived; renderEnvelopes(); break;
    case 'env-unarchive': envUnarchive(arg); break;
    case 'env-rename': (function(){ var e=findEnv(state.envDetail.id); if(e){ state.envRename={id:e.id, name:e.name, group:e.group}; renderEnvDetail(); } })(); break;
    case 'env-rename-cancel': state.envRename=null; renderEnvDetail(); break;
    case 'env-rename-save': envRenameSave(); break;
    case 'env-archive': envArchive(arg); break;
    case 'hs-group': (function(){
      var hs = state.healthset, g = arg;
      var ci = hs.cashGroups.indexOf(g), di = hs.debtGroups.indexOf(g);
      if(ci===-1 && di===-1) hs.cashGroups.push(g);        // not counted → cash
      else if(ci>-1){ hs.cashGroups.splice(ci,1); hs.debtGroups.push(g); } // cash → debt
      else hs.debtGroups.splice(di,1);                      // debt → not counted
      drawHealthSettings();
    })(); break;
    case 'hs-env': (function(){
      var hs = state.healthset;
      var i = hs.offBudget.indexOf(arg);
      if(i===-1) hs.offBudget.push(arg); else hs.offBudget.splice(i,1);
      drawHealthSettings();
    })(); break;
    case 'hs-save': hsSave(); break;
    case 'admin-add': adminAdd(); break;
    case 'admin-remove': adminRemove(arg); break;
    case 'logout': signOut(); break;
    case 'rmtxn-search': removeTxnSearch(); break;
    case 'rmtxn-go': removeTxnGo(arg); break;
    case 'recon-update': reconUpdate(arg); break;
    case 'recon-cancel': reconCancel(); break;
    case 'recon-save': reconSave(arg); break;
    case 'recon-reviewed': reconReviewed(arg); break;
    case 'recon-manual': reconToggleManual(arg); break;
    case 'snapshot-tiller': snapshotToTiller(); break;
    case 'recon-dormant-toggle': state.showDormant = !state.showDormant; drawReconcile(); break;
    case 'env-filter': if(state.envDetail){ state.envDetail.filter=arg; renderEnvDetail(); } break;
    case 'acct-toggle': acctToggle(arg); break;
    case 'import-now': importNowUi(); break;
    case 'bal-reorder':
      state.balReorder = !state.balReorder;
      if(!state.balReorder) balSaveOrder();
      drawBalances(); break;
    case 'bal-up': balMove(arg,-1); break;
    case 'bal-down': balMove(arg,1); break;
    case 'bal-acct-up': balMoveAccount(p[0],p[1],-1); break;
    case 'bal-acct-down': balMoveAccount(p[0],p[1],1); break;
    case 'bal-edit': balEdit(arg); break;
    case 'bal-edit-save': balEditSave(arg); break;
    case 'bal-edit-cancel': balEditCancel(); break;
    case 'sync-refresh':
      state.sync = null;
      renderSync(); break;
    case 'sync-dups-toggle':
      state.showAllDups = !state.showAllDups;
      drawSync(); break;
    case 'accept-tiller': acceptTiller(arg); break;
    case 'backfill-go': backfillGo(); break;
    case 'inspect-txn': inspectTxn(arg); break;
    case 'inspect-close':
      if(el.tagName==='BUTTON' || ev.target===el) $('#ovl').innerHTML='';
      break;
    case 'env-move-start': state.move={toId:'', amount:''}; renderEnvDetail(); break;
    case 'env-move-cancel': state.move=null; renderEnvDetail(); break;
    case 'env-move-go': moveGo(); break;
    case 'env-sweep-pool': sweepToPool(); break;
    case 'resplit-on':
      var rt = (state.register.items||[]).find(function(x){return x.txnId===arg;});
      if(rt) state.resplit[arg] = rt.legs.map(function(l){
        return {envelopeId:l.envelopeId, amount:l.amount}; });
      drawTxns(); break;
    case 'resplit-cancel': delete state.resplit[arg]; drawTxns(); break;
    case 'resplit-go': resplitGo(arg); break;
    case 'unapprove': unapprove(arg); break;
    case 'undo': doUndo(arg); break;
  }
});
document.addEventListener('input', function(ev){
  var el = ev.target.closest('[data-act]');
  if(!el) return;
  var p = (el.dataset.arg||'').split('|');
  if(el.dataset.act==='fund-amt'){
    var ff = state.fund[el.dataset.arg];
    if(ff){ ff.amount = el.value; fundRecompute(el.dataset.arg); }
    return;
  }
  if(el.dataset.act==='split-amt'){
    var lines = splitLinesOf(p[0], p[1]);
    if(lines[Number(p[2])]){
      lines[Number(p[2])].amount = el.value;
      // Pool funding: target is the typed amount, not an Inbox txn.
      if(p[0]==='fund'){ fundRecompute(p[1]); return; }
      var foot = el.closest('.splitbox');
      if(foot){ // live-update remaining without full redraw (keeps focus)
        var key=p[1], kind=p[0];
        var total = 0;
        if(kind==='inbox'){
          var t=(state.inbox||[]).find(function(x){return x.txnId===key;}); total=t?t.amount:0;
        } else {
          var r=(state.register.items||[]).find(function(x){return x.txnId===key;}); total=r?r.amount:0;
        }
        // v3.22: sign-normalize each leg (splitAmt) like the render path and
        // splitReady do — raw cents(l.amount) made every SPEND transaction
        // show a wrong red "Remaining" (e.g. −$50 split 25/25 → "−$100.00")
        // while the Approve button was correctly enabled.
        var sum=0; lines.forEach(function(l){ sum+=cents(splitAmt(total, l.amount)); });
        var left=cents(total)-sum;
        var lf=foot.querySelector('.splitfoot .left');
        if(lf){ lf.textContent = left===0?'Fully assigned ✓':'Remaining: '+money(Math.abs(left)/100);
          lf.classList.toggle('bad', left!==0); }
        // refresh action buttons enabled state
        var card = el.closest('.txncard, .regrow');
        if(card){
          var btn = card.querySelector('[data-act="approve-split"],[data-act="resplit-go"],[data-act="fund-go"]');
          if(btn){
            var ready = splitReady(total, lines) &&
              (btn.dataset.act!=='fund-go' || (state.fund[key]&&state.fund[key].incomeEnvelopeId));
            btn.disabled = !ready;
          }
        }
      }
    }
  } else if(el.dataset.act==='plan-fixed'){
    planFormCapture(); state.planEdit.lines[Number(el.dataset.arg)].fixed = el.value;
  } else if(el.dataset.act==='plan-pct'){
    planFormCapture(); state.planEdit.lines[Number(el.dataset.arg)].percent = el.value;
  } else if(el.dataset.act==='move-amt'){
    if(state.move) state.move.amount = el.value;
  }
});
document.addEventListener('change', function(ev){
  var el = ev.target.closest('[data-act]');
  if(!el) return;
  if(el.dataset.act==='fund-inc'){
    var f = state.fund[el.dataset.arg];
    if(f){ f.incomeEnvelopeId = el.value; drawFund(); }
  } else if(el.dataset.act==='reg-acct'){
    state.register.account = el.value; state.register.limit=50; renderTxns();
  }
});

/* ============================ start ============================ */
/* v3.28 instant open: paint the last-known dashboard from cache immediately so the
   app never sits blank during the cold apiBoot round trip, then revalidate.
   - token still valid → boot() now (don't wait for Google's auto-select)
   - token expired but we have a cached view → keep it on screen with the refresh
     bar; GSI auto-select (gsiReady → onCredential) refreshes the token and boots
   - nothing cached and no valid token → the sign-in screen, as before */
(function start(){
  var hydrated = hydrateSnapshot_();
  if(hydrated){
    setGreeting_();
    try{ render(); }
    catch(e){ console.warn('hydrate render failed:', e && e.message || e); state.boot=null; hydrated=false; }
  }
  if(authValid()){
    // v3.30: nothing cached → paint the home skeleton instead of a blank page
    // while the (possibly cold, 10-25s) apiBoot round trip runs.
    if(!hydrated){ try{ $('#shell').innerHTML = homeSkeletonHtml_(); }catch(e){} }
    boot();
  } else if(hydrated){
    setRefreshing_(true); // cached view stays up; GSI will refresh the token and boot()
  } else {
    $('#signin').style.display='flex'; $('#shell').innerHTML='';
  }
})();
</script>
