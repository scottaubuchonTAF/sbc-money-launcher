<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>SBC Money</title>
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="SBC Money">
<meta name="theme-color" content="#0f766e">
<script src="https://accounts.google.com/gsi/client" onload="gsiReady()" onerror="gsiFailed()" async defer></script>
<!-- v2a: Chart.js for dashboard chart widgets. If it fails to load (offline/CDN),
     chart widgets show a graceful "chart unavailable" message; the rest of the app
     is unaffected (typeof Chart is guarded everywhere it's used). -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --teal-900:#0d3b36; --teal-800:#11514a; --teal-700:#0f766e; --teal-600:#0d9488;
  --teal-500:#14b8a6; --teal-300:#5eead4; --teal-50:#f0fdfa; --teal-100:#ccfbf1;
  --ink:#0f172a; --ink-2:#475569; --ink-3:#94a3b8;
  --bg:#f6f8fa; --card:#ffffff; --line:#e2e8f0;
  --red:#dc2626; --red-bg:#fef2f2; --green:#059669; --amber:#d97706;
  --radius:16px; --shadow:0 1px 3px rgba(15,23,42,.06),0 4px 16px rgba(15,23,42,.05);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font:15px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,sans-serif;
  background:var(--bg); color:var(--ink);
  padding-bottom:calc(64px + env(safe-area-inset-bottom));
}
/* v3.28: slim top progress bar shown while the app revalidates in the background
   (after an instant paint from cache). Works on phone (no topbar) and desktop. */
#refbar{position:fixed;top:0;left:0;height:3px;width:100%;z-index:60;
  background:var(--teal-500);transform-origin:left;transform:scaleX(0);opacity:0;
  pointer-events:none;transition:opacity .2s}
body.refreshing #refbar{opacity:1;animation:refslide 1.1s ease-in-out infinite}
@keyframes refslide{0%{transform:scaleX(.05)}50%{transform:scaleX(.75)}100%{transform:scaleX(.05)}}
button{font:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select{font:inherit}

/* ================= layout: phone tabs / desktop sidebar ================= */
.shell{max-width:680px;margin:0 auto;padding:16px 16px 24px}
nav.tabs{
  position:fixed;left:0;right:0;bottom:0;z-index:30;
  display:flex;background:var(--card);border-top:1px solid var(--line);
  padding-bottom:env(safe-area-inset-bottom);
}
nav.tabs button{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:8px 0 6px;color:var(--ink-3);font-size:11px;font-weight:600;position:relative;
}
nav.tabs button.on{color:var(--teal-700)}
nav.tabs svg{width:22px;height:22px}
nav.tabs .badge{
  position:absolute;top:3px;left:calc(50% + 6px);
  background:var(--red);color:#fff;font-size:10px;font-weight:700;
  border-radius:99px;padding:1px 5px;min-width:16px;text-align:center;
}
aside.side{display:none}
.topbar{display:none}

@media(min-width:900px){
  body{padding-bottom:0}
  nav.tabs{display:none}
  .app{display:flex;min-height:100vh}
  aside.side{
    display:flex;flex-direction:column;gap:2px;width:236px;flex-shrink:0;
    background:var(--teal-900);padding:22px 14px 18px;position:sticky;top:0;height:100vh;
  }
  aside.side .brand{padding:2px 10px 20px}
  aside.side .navlbl{color:#5d837d;font-size:10.5px;font-weight:700;letter-spacing:.1em;
    text-transform:uppercase;padding:14px 12px 6px}
  aside.side button.nav{
    display:flex;align-items:center;gap:11px;color:#9fc0bb;font-weight:600;
    padding:10px 12px;border-radius:10px;text-align:left;font-size:14px;width:100%;
  }
  aside.side button.nav svg{width:18px;height:18px;flex-shrink:0}
  aside.side button.nav.on{background:rgba(255,255,255,.12);color:#fff}
  aside.side button.nav:hover{color:#fff}
  aside.side .badge{margin-left:auto;background:var(--teal-500);color:#fff;
    font-size:11px;font-weight:700;border-radius:99px;padding:1px 7px}
  aside.side .beta{margin-left:auto;background:rgba(255,255,255,.13);color:#a9cdc7;
    font-size:9px;font-weight:800;letter-spacing:.08em;border-radius:5px;padding:2px 6px}
  aside.side .foot{margin-top:auto;color:#6e958f;font-size:11px;padding:0 12px;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .main{flex:1;min-width:0}
  .shell{max-width:1240px;padding:30px 40px 56px;margin:0}
  .shell.narrow{max-width:860px}
  .topbar{display:flex;align-items:baseline;justify-content:space-between;
    max-width:1240px;padding:26px 40px 0;color:var(--ink-3);font-size:13px}
}

/* ================= dashboard ================= */
.stats{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px}
@media(min-width:900px){.stats{grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}}
.stat{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px 18px}
.stat .lbl{font-size:11.5px;font-weight:700;color:var(--ink-3);text-transform:uppercase;letter-spacing:.05em}
.stat .num{font-size:24px;font-weight:800;letter-spacing:-.02em;margin-top:3px;font-variant-numeric:tabular-nums}
@media(min-width:900px){.stat .num{font-size:28px}}
.stat .sub{font-size:12px;color:var(--ink-3);margin-top:3px}
.stat.hero{background:linear-gradient(135deg,var(--teal-700),var(--teal-600));color:#fff}
.stat.hero .lbl,.stat.hero .sub{color:rgba(255,255,255,.8)}
.bar{height:7px;border-radius:99px;background:var(--line);overflow:hidden;margin-top:9px}
.bar i{display:block;height:100%;border-radius:99px;background:var(--teal-500)}
.stat.hero .bar{background:rgba(255,255,255,.25)} .stat.hero .bar i{background:#fff}
.dashcols{display:block}
@media(min-width:900px){.dashcols{display:grid;grid-template-columns:1.25fr 1fr;gap:20px;align-items:start}}

/* ================= cards / lists ================= */
.grp{margin-bottom:18px;break-inside:avoid}
.grp h3{font-size:12.5px;font-weight:700;color:var(--ink-2);text-transform:uppercase;
  letter-spacing:.05em;margin:0 4px 8px}
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.envrow{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--line)}
.envrow:last-child{border-bottom:none}
.envrow .nm{flex:1;font-weight:600;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.envrow .bal{font-weight:700;font-variant-numeric:tabular-nums}
.envrow .bal.neg{color:var(--red);background:var(--red-bg);padding:2px 8px;border-radius:8px}
.envgrid{display:block}
@media(min-width:900px){.envgrid{columns:2;column-gap:20px}}
@media(min-width:1240px){.envgrid{columns:3}}
.fundrow{padding:11px 16px;border-bottom:1px solid var(--line)}
.fundrow:last-child{border-bottom:none}
.fundrow .l1{display:flex;justify-content:space-between;gap:10px;font-size:13.5px}
.fundrow .l1 .nm{font-weight:600;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fundrow .l1 .v{color:var(--ink-2);font-variant-numeric:tabular-nums;white-space:nowrap}

/* ================= v3.30 home screen (fixed Layout A) =================
   One fixed layout: a 4-stat row, then two columns of cards. The only
   customization is SHOW/HIDE per card (Customize sheet) — the v3.18–v3.20
   drag/resize widget grid is gone. */
.htop{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.htop .sp{flex:1}
.dwbtn{border:1.5px solid var(--line);background:var(--card);color:var(--ink-2);font-weight:700;
  font-size:13px;padding:8px 15px;border-radius:10px;cursor:pointer}
.dwbtn.on{background:var(--teal-600);border-color:var(--teal-600);color:#fff}
.hstats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:14px}
.hstats .dtile{min-height:108px}
/* Body cards flow into two height-balanced columns (browser balances). Cards
   never split across a column. Order = the user's saved order (top→bottom). */
.hbody{column-count:2;column-gap:14px}
.hbody > .dtile{break-inside:avoid;-webkit-column-break-inside:avoid;margin:0 0 14px;display:flex}
.hbody .dtile .dscroll{max-height:320px}
.hbody .dwchart{height:170px;flex:none}
.dtile{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;
  position:relative;display:flex;flex-direction:column;padding:16px 18px}
.dtile.hero{background:linear-gradient(140deg,var(--teal-800),var(--teal-600));color:#fff}
.dtile.nav{cursor:pointer}
/* skeleton shimmer — shown wherever a value hasn't loaded yet (first run /
   post-invalidate). Cached opens paint real numbers instantly instead. */
@keyframes skvslide{0%{background-position:-200px 0}100%{background-position:200px 0}}
.skv{display:inline-block;color:transparent!important;border-radius:6px;min-width:64px;
  background:linear-gradient(90deg,#e8edf2 25%,#f4f7f9 50%,#e8edf2 75%);
  background-size:200px 100%;animation:skvslide 1.1s linear infinite;user-select:none}
.dtile.hero .skv{background:linear-gradient(90deg,rgba(255,255,255,.22) 25%,rgba(255,255,255,.38) 50%,rgba(255,255,255,.22) 75%);background-size:200px 100%}
.dtile .dlbl{font-size:10.5px;font-weight:700;color:var(--ink-3);text-transform:uppercase;letter-spacing:.06em}
.dtile.hero .dlbl{color:rgba(255,255,255,.72)}
.dtile .dnum{font-size:23px;font-weight:800;letter-spacing:-.02em;margin-top:4px;font-variant-numeric:tabular-nums}
.dtile .dnum.big{font-size:31px}
.dtile.hero .dnum{font-size:30px}
.dtile .dsub{font-size:12px;color:var(--ink-3);margin-top:4px}
.dtile.hero .dsub{color:rgba(255,255,255,.85)}
.dtile .dbar{height:8px;border-radius:99px;background:var(--line);overflow:hidden;margin-top:9px}
.dtile .dbar i{display:block;height:100%;border-radius:99px;background:var(--teal-500)}
.dtile.hero .dbar{background:rgba(255,255,255,.25)} .dtile.hero .dbar i{background:#fff}
.dtile .dhead{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.dtile .dscroll{overflow:auto;flex:1;min-height:0;margin:0 -18px;padding:0 18px}
.dkv{display:flex;justify-content:space-between;font-size:12.5px;padding:6px 0;border-top:1px solid var(--line)}
.dkv:first-child{border-top:none}
.dkv .k{color:var(--ink-2)} .dkv .v{font-weight:700;font-variant-numeric:tabular-nums}
.dkv .v.neg{color:var(--red)}
.dfrow{padding:7px 0;border-top:1px solid var(--line)}
.dfrow:first-child{border-top:none}
.dfrow .l1{display:flex;justify-content:space-between;font-size:12.5px}
.dfrow .l1 .nm{font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dfrow .l1 .v{color:var(--ink-2);font-variant-numeric:tabular-nums;white-space:nowrap}
.dokpill{display:inline-flex;align-items:center;gap:6px;font-weight:700;font-size:12px;padding:5px 10px;
  border-radius:99px;background:#ecfdf5;color:var(--green)}
.dwarnpill{display:inline-flex;align-items:center;gap:6px;font-weight:700;font-size:12px;padding:5px 10px;
  border-radius:99px;background:#fffbeb;color:var(--amber)}
.dgauge{position:relative;flex:1;min-height:0;display:grid;place-items:center;margin-top:6px}
.dgauge .ring{width:110px;height:110px;border-radius:50%;display:grid;place-items:center;position:relative}
.hbody .dgauge{flex:none;padding:8px 0}
.dgauge .ring::after{content:"";position:absolute;inset:12px;background:var(--card);border-radius:50%}
.dgauge .ic{position:relative;z-index:1;text-align:center}
.dgauge .ic b{font-size:20px;font-weight:800}
.dgauge .ic span{display:block;font-size:10px;color:var(--ink-3);font-weight:700}
.dmini{display:flex;gap:18px;margin-top:8px;justify-content:center}
.dmini .k{font-size:9.5px;color:var(--ink-3);font-weight:700;text-transform:uppercase;letter-spacing:.05em}
.dmini .v{font-size:14px;font-weight:800;font-variant-numeric:tabular-nums}
/* Customize sheet (show/hide cards) — reuses the bottom-sheet pattern */
.dwlib{position:fixed;inset:0;background:rgba(15,23,42,.35);display:flex;align-items:flex-end;justify-content:center;z-index:60}
.dwlib .sheet{background:var(--card);border-radius:20px 20px 0 0;width:100%;max-width:680px;padding:20px 22px 26px;max-height:80vh;overflow:auto}
.dwlib h3{font-size:16px;margin-bottom:4px}
.dwlib .desc{font-size:13px;color:var(--ink-3);margin-bottom:16px}
.custlbl{font-size:11px;font-weight:800;color:var(--ink-3);text-transform:uppercase;letter-spacing:.06em;margin:16px 0 8px}
.custlbl:first-child{margin-top:0}
.dwlibgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.custlist{display:flex;flex-direction:column;gap:8px}
.dwlibitem{border:1.5px solid var(--line);border-radius:14px;padding:11px 13px;display:flex;gap:11px;align-items:center}
.dwlibitem.off{opacity:.55}
.dwlibitem .ic{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;font-size:16px;background:var(--teal-50);flex:none}
.dwlibitem .lbl{min-width:0}
.dwlibitem .t{font-weight:700;font-size:13.5px}
.dwlibitem .d{font-size:11.5px;color:var(--ink-3)}
.dwlibitem .mv{margin-left:auto;display:flex;gap:4px;flex:none}
.dwlibitem .mv button{width:30px;height:30px;border-radius:8px;border:1.5px solid var(--line);background:var(--card);
  color:var(--ink-2);font-size:14px;font-weight:800;cursor:pointer;line-height:1}
.dwlibitem .mv button:hover{border-color:var(--teal-400,#2dd4bf);color:var(--teal-700)}
.dwlibitem .tog{border:none;font-weight:700;font-size:12px;padding:7px 12px;border-radius:9px;cursor:pointer;flex:none;
  background:var(--teal-600);color:#fff}
.dwlibgrid .dwlibitem .tog{margin-left:auto}
.dwlibitem.off .tog{background:var(--line);color:var(--ink-2)}
.dwchart{position:relative;flex:1;min-height:0;margin-top:6px}
.dwchart.spark{flex:none;height:46px;margin-top:8px}
.dtile .dwmiss{flex:1;display:grid;place-items:center;color:var(--ink-3);font-size:12.5px;text-align:center;padding:14px 0}
@media(max-width:900px){
  .hstats{grid-template-columns:repeat(2,1fr);gap:10px}
  .hbody{column-count:1}
  .dwlibgrid{grid-template-columns:1fr}
}

/* ================= inbox / txn cards ================= */
.txncard{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
  padding:18px;margin-bottom:14px}
.txncard .top{display:flex;justify-content:space-between;gap:12px;align-items:baseline}
.txncard .desc{font-weight:700;font-size:15.5px;min-width:0}
.txncard .amt{font-weight:800;font-size:17px;white-space:nowrap;font-variant-numeric:tabular-nums}
.txncard .amt.neg{color:var(--ink)} .txncard .amt.pos{color:var(--green)}
.txncard .meta{color:var(--ink-3);font-size:12.5px;margin-top:3px}
.pills{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}
.pill{
  border:1.5px solid var(--line);border-radius:99px;padding:7px 14px;font-weight:600;
  font-size:13.5px;background:var(--card);color:var(--ink-2);
}
.pill.sugg{border-color:var(--teal-600);background:var(--teal-50);color:var(--teal-700)}
.pill.sel{background:var(--teal-600);border-color:var(--teal-600);color:#fff}
.actions{display:flex;gap:10px;margin-top:16px;align-items:center;flex-wrap:wrap}
.btn{
  border-radius:99px;padding:11px 22px;font-weight:700;font-size:14.5px;
  background:var(--teal-600);color:#fff;transition:opacity .15s;
}
.btn:disabled{opacity:.4;cursor:default}
.btn.ghost{background:var(--teal-50);color:var(--teal-700)}
.btn.danger{background:var(--red-bg);color:var(--red)}
.btn.sm{padding:7px 14px;font-size:13px}
.rulechk{display:flex;align-items:center;gap:7px;font-size:13px;color:var(--ink-2);margin-left:auto}

/* ================= split editor ================= */
.splitbox{margin-top:14px;border:1.5px dashed var(--line);border-radius:12px;padding:12px}
.splitline{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.splitline .envbtn{
  flex:1;min-width:0;text-align:left;border:1.5px solid var(--line);border-radius:10px;
  padding:9px 12px;font-weight:600;font-size:13.5px;background:var(--bg);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.splitline .envbtn.unset{color:var(--ink-3);font-weight:500}
.splitline input{
  width:108px;padding:9px 10px;border:1.5px solid var(--line);border-radius:10px;
  text-align:right;background:var(--card);font-variant-numeric:tabular-nums;
}
.splitline input:focus{outline:none;border-color:var(--teal-500)}
.splitline .rm{color:var(--ink-3);font-size:17px;padding:4px 6px}
.splitfoot{display:flex;justify-content:space-between;align-items:center;font-size:13px;margin-top:4px}
.splitfoot .left{color:var(--teal-700);font-weight:700;font-variant-numeric:tabular-nums}
.splitfoot .left.bad{color:var(--red)}
.addline{color:var(--teal-700);font-weight:700;font-size:13px}

/* ================= picker overlay ================= */
.ovl{position:fixed;inset:0;background:rgba(15,23,42,.4);z-index:60;display:flex;
  align-items:flex-end;justify-content:center}
@media(min-width:900px){.ovl{align-items:center}}
.panel{background:var(--card);border-radius:18px 18px 0 0;width:100%;max-width:520px;
  max-height:78vh;display:flex;flex-direction:column;padding:16px}
@media(min-width:900px){.panel{border-radius:18px}}
.panel input{
  width:100%;padding:11px 14px;border:1.5px solid var(--line);border-radius:12px;
  background:var(--bg);margin-bottom:8px;
}
.panel input:focus{outline:none;border-color:var(--teal-500)}
.picklist{overflow:auto;flex:1;border:1px solid var(--line);border-radius:12px}
.picklist button{display:flex;width:100%;justify-content:space-between;gap:10px;
  padding:10px 14px;font-size:14px;border-bottom:1px solid var(--line);text-align:left}
.picklist button:last-child{border-bottom:none}
.picklist button:hover{background:var(--teal-50)}
.picklist .g{color:var(--ink-3);font-size:12px;white-space:nowrap}
.panel.confirm{max-width:400px;padding:20px}
.panel.confirm .cmsg{font-weight:600;font-size:15px;line-height:1.5;white-space:pre-line}
.panel.confirm .actions{margin-top:16px}

/* ================= transactions view ================= */
.searchbar{display:flex;gap:10px;margin-bottom:14px}
.searchbar input{
  flex:1;padding:11px 14px;border:1.5px solid var(--line);border-radius:12px;background:var(--card);
}
.searchbar input:focus{outline:none;border-color:var(--teal-500)}
.regrow{padding:13px 16px;border-bottom:1px solid var(--line)}
.regrow:last-child{border-bottom:none}
.regrow .l1{display:flex;justify-content:space-between;gap:12px;align-items:baseline}
.regrow .desc{font-weight:600;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.regrow .amt{font-weight:700;white-space:nowrap;font-variant-numeric:tabular-nums}
.regrow .amt.pos{color:var(--green)}
.regrow .meta{color:var(--ink-3);font-size:12px;margin-top:2px}
.legchips{display:flex;flex-wrap:wrap;gap:6px;margin-top:7px}
.legchip{background:var(--teal-50);color:var(--teal-800);font-size:12px;font-weight:600;
  border-radius:8px;padding:3px 9px}
.reglinks{display:flex;gap:14px;margin-top:8px}
.reglinks button{color:var(--teal-700);font-weight:700;font-size:12.5px}
.reglinks button.warn{color:var(--red)}

/* v3.28.1: single-line register (desktop, mid/compact density). Everything on one
   row: date · description · account · envelope(s) · ⋮ menu · amount. Comfortable and
   phone keep the stacked .regrow cards above. */
/* v3.28.1 fix: the base .card is overflow:hidden and .rc cells clip text — both
   were clipping the ⋮ dropdown to nothing. Let the table + menu cell overflow so
   the popover shows; keep the header's top corners rounded to match the card. */
.card.regtable{overflow:visible}
.regtable .rrow{display:grid;
  grid-template-columns:78px minmax(120px,1.4fr) 148px minmax(120px,1.3fr) 30px 100px;
  gap:12px;align-items:center;padding:8px 14px;border-bottom:1px solid var(--line)}
.regtable .rrow:last-child{border-bottom:none}
/* v3.29.2: the "Show all" freeze fix. Appending thousands of rows re-laid-out
   the WHOLE grid on every chunk (O(n²) — the 150s "Page Unresponsive").
   content-visibility:auto lets the browser skip layout+paint for offscreen
   rows entirely; verified live: 10,926 rows stream in with the page responsive
   throughout. contain-intrinsic-size keeps the scrollbar honest. */
.regtable .rrow:not(.rhead){content-visibility:auto;contain-intrinsic-size:auto 44px}

var MUTATING = { apiApprove:1, apiApproveBatch:1, apiResplit:1, apiUnapprove:1, apiMove:1,
  apiFund:1, apiFundFromPool:1, apiSavePlan:1, apiReconcileToBank:1, apiManualBalance:1,

  apiSetHealthSettings:1, apiSetAllowedEmails:1, apiPlanFromTiller:1, apiUndo:1,
  apiImportNow:1, apiSetAccountHidden:1, apiSetBalanceGroupOrder:1,

  // before ensureAuth(), so an abandoned sign-in held the lock forever and
  // every later action toasted "Hang on…" until a full reload.

    if(mutating){

function apiCall_(fn, args, retry, mutating){

  // failure (network, auth, unsupported, empty mirror) silently falls back
  // to the Apps Script backend below.
  if(!mutating && SUPA_READS[fn] && supaOn_()){
    return supaCall_(fn, args).catch(function(err){
      supaFails_++;
      try{ console.info('SBC mirror fallback for '+fn+': '+(err && err.message || err)); }catch(e){}
      return legacyCall_(fn, args, retry, mutating);
    });
  }
  // v3.32 Phase 2: approvals go to the mirror first (instant). Fallback is
  // only safe when the mirror DEFINITIVELY didn't apply the write; a network
  // ambiguity must never be retried (double-approve risk — v3.22 lesson).
  if(mutating && SUPA_WRITES[fn] && supaOn_()){
    return supaWriteCall_(fn, args).catch(function(err){
      if(!(err && err.notServed)) supaFails_++;  // v3.33: notServed = routine, no penalty
      if(err && (err.definitive || err.notServed)){
        try{ console.info('SBC mirror write fallback for '+fn+': '+(err.message||err)); }catch(e){}
        return legacyCall_(fn, args, retry, mutating);
      }
      throw new Error("That didn't confirm (connection hiccup). Check the inbox in a moment before retrying — it may have gone through.");

}
function legacyCall_(fn, args, retry, mutating){

  // full-scan can run long; without this the UI spins forever).
  // v3.22: NO client-side abort for MUTATING calls — the server keeps running
  // after an abort, so "timed out" + a user retry could double-apply a
  // non-idempotent Tiller write. Mutations wait; only reads time out at 30s.
  var ctrl = (!mutating && typeof AbortController!=='undefined') ? new AbortController() : null;
  var timedOut = false;
  var timer = mutating ? null : setTimeout(function(){ timedOut=true; if(ctrl) ctrl.abort(); }, 30000);
  return fetch(backendUrl(), { method:'POST',
      body: JSON.stringify({ token:auth.token, fn:fn, args:args }),
      signal: ctrl ? ctrl.signal : undefined })

    if(!r.ok) throw new Error('Network error ('+r.status+')');
    return r.json();
  })
  .then(function(res){
    clearTimeout(timer);
    if(res.ok) return res.result;
    if(res.auth){
      auth = { token:'', email:'', exp:0 }; persistAuth();
      if(/allowlist/.test(res.error||'')){
        var el = $('#signinErr'); if(el) el.textContent = res.error;
        throw new Error(res.error);
      }
      if(retry) return ensureAuth().then(function(){ return legacyCall_(fn, args, false, mutating); });
    }
    throw new Error(res.error || 'Server error');
  }, function(err){
    clearTimeout(timer);
    if(timedOut) throw new Error('That took too long and was stopped — the server may still be finishing. Wait a moment, then reload.');
    throw err;
  });
}

/* ============================ boot ============================ */
/* v3.26.2: back to the TWO-STEP path (apiBoot, then parallel prewarm calls).
   The v3.26.0 combined apiColdStart was measured live 7/13/26 and LOST:
   Apps Script runs its sections sequentially in one execution (~20s+ total,
   26-28s observed), while the old path overlaps the same calls for ~10s cold.
   Worse, before the v3.26.1 budget it blew the 30s read timeout every load
   (30s stall + fallback ≈ 40s). apiColdStart stays on the server (harmless,
   budget-capped) but the frontend no longer calls it. */
function boot(){
  if(state._booting) return;              // v3.28: avoid a double apiBoot (start + GSI credential)
  state._booting = true;
  setRefreshing_(true);
  run('apiBoot').then(function(res){ state._booting=false; bootApply_(res); })
    .catch(function(e){
      state._booting = false; setRefreshing_(false);
      // v3.28: if we already painted a cached view, keep it up and just log; only
      // hard-fail (blank error) when there was nothing on screen to begin with.
      if(!state._booted && !state.boot) fail(e);
      else console.warn('boot revalidate failed (showing cached):', e && e.message || e);
    });

function bootApply_(res){
    state.boot = res.boot; state.picker = res.picker;
    // v3.30: isDefault means "no saved row" — keep null so the Layout-A default
    // hidden set applies (the server default is the OLD grid's starter set).
    if(res.dashLayout && Array.isArray(res.dashLayout.layout) && !res.dashLayout.isDefault) state.dashLayout = res.dashLayout.layout;
    if(res.density && res.density.value) applyDensity(res.density.value, false); // v3.28: per-user density
    state._booted = true;                  // v3.28: real (server) data is now loaded
    setGreeting_();
    saveSnapshot_();                       // v3.28: persist for the next instant open
    render();
    if(state.view!=='dash') setRefreshing_(false); // dash clears when its data lands (dashFetchDash)
    prewarm();
}
/* v3.28: instant-open helpers. We cache the last successful boot + dashboard so the
   next open paints immediately instead of waiting on the cold apiBoot round trip. */
function setRefreshing_(on){ try{ document.body.classList.toggle('refreshing', !!on); }catch(e){} }
function saveSnapshot_(){
  try{
    if(!state.boot) return;
    localStorage.setItem('sbcSnapshot', JSON.stringify({
      v:1, at:Date.now(), boot:state.boot, picker:state.picker||null,
      dash:state.dash||null, dashSeries:state.dashSeries||null
    }));
  }catch(e){ /* quota or serialize error — non-fatal, just skip caching */ }
}
function hydrateSnapshot_(){
  try{
    var s = JSON.parse(localStorage.getItem('sbcSnapshot')||'null');
    if(s && s.boot){
      state.boot = s.boot; state.picker = s.picker || state.picker;
      state.dash = s.dash || null; state.dashSeries = s.dashSeries || null;
      return true;
    }
  }catch(e){}
  return false;
}
function setGreeting_(){
  if(!state.boot) return;
  updateBadges(state.boot.inboxCount||0);
  var sf = $('#sideFoot');
  if(sf) sf.innerHTML = '<div style="margin-bottom:7px;word-break:break-all">'+esc(state.boot.user)+'</div>'+
    '<button data-act="logout" style="width:100%;padding:7px 10px;border-radius:8px;cursor:pointer;'+
    'background:rgba(255,255,255,.08);color:#d7efe9;border:1px solid rgba(255,255,255,.16);font-size:12.5px">Log out</button>';
  var h = new Date().getHours();
  var nm = String(auth.email || state.boot.user || '').split('@')[0];
  nm = nm ? nm.charAt(0).toUpperCase()+nm.slice(1) : '';
  var g=$('#greet'); if(g) g.textContent = (h<12?'Good morning':h<17?'Good afternoon':'Good evening')+(nm?', '+nm:'');
  var t=$('#todayLbl'); if(t) t.textContent = new Date().toLocaleDateString(undefined,
    {weekday:'long', month:'long', day:'numeric'});
}
/* Warm every view's cache in the background after load. v3.16: fired together,
   not on staggered timers — Apps Script serializes calls per-user server-side,
   so the old 300→4200ms stagger only added latency. The visible view's own load
   was already kicked off by render(). Failures are logged, not swallowed. */
function prewarm(){
  var warn = function(fn){ return function(e){ console.warn('prewarm '+fn+':', e && e.message || e); }; };
  if(!state.inbox) run('apiGetInbox').then(function(r){
    state.inbox=filterInbox(r); updateBadges(state.inbox.length); markFetched('inbox'); // v3.27; v3.32 pending filter
    if(state.view==='inbox' && !userBusy()) drawInbox();
  }).catch(warn('apiGetInbox'));
  dashFetchDash(true); // v3.22: shared loader — renderDash() fired the same call in
                   // parallel on every cold load (apiDashboard ran TWICE).
                   // v3.28: force=true so a hydrated (cached) dashboard still revalidates.
  if(!state.plans) run('apiPlans').then(function(p){ state.plans=p; }).catch(warn('apiPlans'));
  if(!state.accounts) run('apiAccounts').then(function(a){ state.accounts=a; }).catch(warn('apiAccounts'));
  if(!state.register.items && !state.registerLoading){ // v3.22: shared flag with dashFetchRecent
    state.registerLoading = true;
    run('apiRegister',{q:'',account:'',envelope:'',includeHidden:false,limit:50})
      .then(function(it){ state.register.items=it; state.register.sig='|||0|50'; state.registerLoading=false;
        markFetched('register'); // v3.27 (same limit/filters as the Transactions view); v3.28.1 sig incl. limit
        if(state.view==='dash') renderDash(); })
      .catch(function(e){ state.registerLoading=false; warn('apiRegister')(e); });
  }
  if(!state.accountsFull) run('apiAccountsFull').then(function(a){ state.accountsFull=a; markFetched('accountsFull'); }).catch(warn('apiAccountsFull'));
}
function refreshBoot(){
  return run('apiBootstrap').then(function(b){
    state.boot=b;
    // v3.32: while mirror-approved rows await their write-back, Apps Script's
    // inboxCount is stale-high — trust the filtered local inbox instead.
    var pend = Object.keys(state.pendingApproved||{}).length;
    updateBadges((pend && state.inbox) ? state.inbox.length : b.inboxCount);
  });
}
function updateBadges(n){
  ['#tabBadge','#sideBadge'].forEach(function(s){
    var el=$(s); if(el){ el.textContent=n; el.style.display = n>0?'':'none'; }
  });
}
/* After any mutation: drop derived caches so views refetch fresh data.
   v3.27: the register keeps its items+sig — views now draw the (possibly
   stale) cache instantly and revalidate in the background instead of tearing
   down to a spinner. Freshness stamps are cleared so every warm view
   revalidates on its next visit. */
function invalidateData(){
  state.dash = null;
  state.dashSeries = null;   // v2a: chart series refetches after any mutation
  state.envTxnCache = {};
  state.sync = null;
  state._fetchedAt = {};     // v3.27: mark all warm views stale
}
/* v3.32 Phase 2: a mirror-served approve vanishes from the UI instantly, but
   Apps Script's Inbox keeps the row until the background write-back lands
   (normally seconds). Any inbox refetch in that window would resurrect the
   row. Remember what we approved for 10 minutes and filter refetched
   payloads; once a refetch no longer carries the row, the entry is dropped.
   A row STILL present after 10 minutes means the write-back failed — sheet
   truth wins and the transaction reappears honestly (outbox row says why). */
var PENDING_APPROVED_TTL = 10*60*1000;
state.pendingApproved = {};
function pendingKeyOf(t){ return String((t && (t.key || t.txnId)) || ''); }
function markPendingApproved(keys){
  var now = Date.now();
  (keys||[]).forEach(function(k){ if(k) state.pendingApproved[k] = now; });
}
function filterInbox(rows){
  rows = rows || [];
  var now = Date.now(), present = {};
  rows.forEach(function(t){ present[pendingKeyOf(t)] = 1; });
  Object.keys(state.pendingApproved).forEach(function(k){
    var fresh = (now - state.pendingApproved[k]) < PENDING_APPROVED_TTL;
    if(!present[k] || !fresh) delete state.pendingApproved[k]; // landed, or expired → show it
  });
  return rows.filter(function(t){ return !(pendingKeyOf(t) in state.pendingApproved); });
}
/* v3.27 SWR helpers: a view whose data was fetched in the last TTL (and not
   invalidated by a mutation) skips the background refetch entirely — the
   2.4s+ round trip on every visit was most of why navigation felt slow. */
function markFetched(k){ (state._fetchedAt = state._fetchedAt || {})[k] = Date.now(); }
function freshEnough(k, ttl){
  var ts = state._fetchedAt && state._fetchedAt[k];
  return !!ts && (Date.now() - ts) < (ttl || 60000);
}
/* v3.27: disable+relabel every button for a data-act while a mutation is in
   flight (restore with actBusy(act,false)). Complements busyButtons(). */
function actBusy(act, on, label){
  $all('[data-act="'+act+'"]').forEach(function(b){
    b.disabled = on;
    if(label){
      if(on){ if(!b.dataset.lbl) b.dataset.lbl = b.textContent; b.textContent = label; }
      else if(b.dataset.lbl){ b.textContent = b.dataset.lbl; delete b.dataset.lbl; }
    }
  });
}
/* Skip background re-draws while the user is typing or mid-edit. */
function userBusy(){
  return (document.activeElement && /INPUT|TEXTAREA|SELECT/.test(document.activeElement.tagName)) ||
    Object.keys(state.resplit).length > 0;
}

/* ============================ render dispatch ============================ */
function render(){
  if(!state.boot){ return; }
  // v3.22: destroy charts bound to canvases we're about to detach — leaving
  // Dashboard/Reports previously left live Chart.js instances on detached
  // canvases (slow leak over a long session).
  if(state.view!=='dash') dashDestroyCharts();
  if(state.view!=='reports' && typeof rptChart!=='undefined' && rptChart){
    try{ rptChart.destroy(); }catch(e){} rptChart=null;
  }
  var shell = $('#shell');
  shell.className = 'shell' + (['inbox','fund','more','settings','admin','removetxn','reconcile','history','envelopes','envdetail','about','healthset','howto','activity'].indexOf(state.view)!==-1 ? ' narrow':'');
  if(state.view==='dash') renderDash();
  else if(state.view==='inbox') renderInbox();
  else if(state.view==='fund') renderFund();
  else if(state.view==='envelopes') renderEnvelopes();
  else if(state.view==='envdetail') renderEnvDetail();
  else if(state.view==='plans') renderPlans();
  else if(state.view==='txns') renderTxns();
  else if(state.view==='accounts') renderAccounts();
  else if(state.view==='balances') renderBalances();
  else if(state.view==='reports') renderReports();
  else if(state.view==='sync') renderSync();
  else if(state.view==='more' || state.view==='settings') renderSettings();
  else if(state.view==='admin') renderAdmin();
  else if(state.view==='removetxn') renderRemoveTxn();
  else if(state.view==='reconcile') renderReconcile();
  else if(state.view==='healthset') renderHealthSettings();
  else if(state.view==='about') renderAbout();
  else if(state.view==='howto') renderHowTo();
  else if(state.view==='activity') renderActivity();
  else renderHistory();
}

/* Fetch the 12-month chart series once (lazy — only when a chart widget is on the
   board). Cached + pulse-warmed server-side, so this is usually a fast warm read. */
function dashFetchSeries(){
  if(state.dashSeries || state.dashSeriesLoading) return;
  state.dashSeriesLoading = true;
  run('apiDashSeries').then(function(r){
    state.dashSeries = (r && r.monthly) || [];
    state.dashSeriesLoading = false;
    if(state.view==='dash') renderDash();
  }).catch(function(e){ state.dashSeriesLoading=false; console.warn('dash series:', e&&e.message||e); });
}
/* v2b-1: lazy loads for the Accounts + Recent-activity widgets (reuse existing
   endpoints; only fired when those widgets are on the board). */
function dashFetchBalances(){
  if(state.balances || state.balancesLoading) return;
  state.balancesLoading = true;
  run('apiBalances').then(function(b){ state.balances=b; state.balancesLoading=false; markFetched('balances'); if(state.view==='dash') renderDash(); })
    .catch(function(e){ state.balancesLoading=false; console.warn('dash balances:', e&&e.message||e); });
}
/* v3.22: shared apiDashboard loader (used by prewarm AND renderDash) — the two
   previously fired the same call in parallel on every cold load. */
function dashFetchDash(force){
  if(state.dashLoading) return;
  if(state.dash && !force) return;       // v3.28: force=true revalidates cached (hydrated) data
  state.dashLoading = true;
  run('apiDashboard').then(function(d){
    state.dash=d; state.dashLoading=false; saveSnapshot_(); setRefreshing_(false); // v3.28
    if(state.view==='dash') renderDash();
    dashRevalHealth_(); // v3.31: mirror lacks feed lag — re-check health on a real gap
  }).catch(function(e){ state.dashLoading=false; setRefreshing_(false); console.warn('apiDashboard:', e&&e.message||e); });
}
/* v3.31: the Supabase mirror serves the dashboard instantly but can't compute
   budgetHealth_'s feed-lag decomposition (Apps Script runtime cache only). When
   the mirror-served health shows a REAL gap (unexplainedOk===false), quietly
   re-fetch health from Apps Script (which has the feed-lag "clears on its own"
   split) and swap just that card. Reconciled = trust the mirror (no extra call).
   No-op when the dashboard was already served by Apps Script (no .mirror flag). */
function dashRevalHealth_(){
  var d=state.dash; if(!d || !d.health || !d.health.mirror) return;
  if(d.health.unexplainedOk!==false) return;          // reconciled → nothing to explain
  if(state._healthReval) return; state._healthReval=true;
  ensureAuth().then(function(){ return legacyCall_('apiDashboard',[null],true,false); })
    .then(function(fresh){ state._healthReval=false;
      if(fresh && fresh.health){
        state.dash.health=fresh.health;
        if(fresh.negatives) state.dash.negatives=fresh.negatives;
        saveSnapshot_(); if(state.view==='dash') renderDash();
      }
    })
    .catch(function(e){ state._healthReval=false; console.warn('health reval:', e&&e.message||e); });
}
function dashFetchRecent(){

  state.registerLoading = true;
  run('apiRegister',{q:'',account:'',envelope:'',includeHidden:false,limit:20}).then(function(it){
    state.register.items=it; state.register.sig='|||0|20'; state.registerLoading=false; if(state.view==='dash') renderDash();
  }).catch(function(e){ state.registerLoading=false; console.warn('dash recent:', e&&e.message||e); });

/* Derive {visible:{id:1}, order:[body ids in display order]} from the saved
   layout (apiBoot / localStorage). The saved array holds VISIBLE ids in order;
   array order carries body order. Old grid saves migrate: their cards stay
   visible, in their saved order. No saved layout → the Layout-A defaults. */
function homeState(){
  var lay = state.dashLayout;
  var visible={}, order=[];
  if(!Array.isArray(lay)){
    HOME_CARDS.forEach(function(c){ if(!HOME_DEFAULT_HIDDEN[c.id]) visible[c.id]=1; });
    order = BODY_IDS.slice();
  } else {
    var seen={};
    lay.forEach(function(w){
      if(!w || !w.id) return;
      var id=homeCardId_(w.id);
      if(!CARD_BY_ID[id] || seen[id]) return;
      seen[id]=1; visible[id]=1;
      if(CARD_BY_ID[id].slot==='body') order.push(id);
    });
    // Body cards not in the saved order (hidden ones, or new cards from an
    // update) get a stable slot at their default position.
    BODY_IDS.forEach(function(id){ if(order.indexOf(id)===-1) order.push(id); });
  }
  return {visible:visible, order:order};
}
function homeSave(st){
  var arr=[];
  HOME_CARDS.forEach(function(c){ if(c.slot==='stats' && st.visible[c.id]) arr.push({id:homePersistId_(c.id), size:'s'}); });
  st.order.forEach(function(id){ if(st.visible[id]) arr.push({id:homePersistId_(id), size:'s'}); });
  state.dashLayout = arr;
  try{ localStorage.setItem('sbcDashLayout', JSON.stringify(state.dashLayout)); }catch(e){}
  clearTimeout(homeSave._t);
  homeSave._t = setTimeout(function(){
    run('apiSetDashLayout',{layout:state.dashLayout}).catch(function(e){ console.warn('save home layout:', e&&e.message||e); });
  }, 600);
}
function tile_(id){
  var w=DASH_WIDGETS[id], c=CARD_BY_ID[id], tapAttr='', clickable=false;
  if(w.report){ tapAttr=' data-act="goreport" data-arg="'+w.report+'"'; clickable=true; }
  else if(w.nav){ tapAttr=' data-act="goview" data-arg="'+w.nav+'"'; clickable=true; }
  return '<div class="dtile'+(w.hero?' hero':'')+(clickable?' nav':'')+'" data-id="'+id+'"'+tapAttr+'>'+w.render(c.size||'m')+'</div>';
}
function renderDash(){
  dashDestroyCharts();
  var st = homeState();
  var stats = HOME_CARDS.filter(function(c){ return c.slot==='stats' && st.visible[c.id] && DASH_WIDGETS[c.id]; }).map(function(c){return c.id;});
  var body  = st.order.filter(function(id){ return st.visible[id] && DASH_WIDGETS[id]; });
  var h='<div class="htop"><span class="sp"></span>'+
    '<button class="dwbtn'+(state.homeCustomize?' on':'')+'" data-act="home-customize">'+(state.homeCustomize?'Done':'Customize')+'</button></div>';
  if(stats.length) h+='<div class="hstats">'+stats.map(tile_).join('')+'</div>';
  h+='<div class="hbody">'+body.map(tile_).join('')+'</div>';
  if(!stats.length && !body.length) h+='<div class="dtile" style="align-items:center;color:var(--ink-3)">Everything is hidden — tap Customize to bring cards back.</div>';
  if(state.homeCustomize) h+=homeCustHtml(st);
  $('#shell').innerHTML = h;
  // Chart cards: instantiate now that their canvases are in the DOM.
  if(typeof Chart!=='undefined'){
    body.concat(stats).forEach(function(id){
      var w=DASH_WIDGETS[id]; if(!w.chart) return;
      var cv=document.getElementById('dwcv_'+id);
      if(cv){ try{ dashCharts[id]=w.init(cv,CARD_BY_ID[id].size||'m'); }catch(e){ console.warn('chart '+id+':', e&&e.message||e); } }
    });
  }
  // Lazy-load extra data only when a card that needs it is visible.
  var vis=st.visible;
  if(vis.trend||vis.inout||vis.buffer) dashFetchSeries();
  if(vis.accounts) dashFetchBalances();
  if(vis.recent) dashFetchRecent();
  dashFetchDash(); // v3.22: shared loader (no duplicate apiDashboard with prewarm)
}
function homeCustHtml(st){

    var w=DASH_WIDGETS[id]; if(!w) return '';
    var off=!st.visible[id];
    var ctrls = movable ? '<span class="mv"><button data-act="home-move" data-arg="'+id+'|up" title="Move up">↑</button>'+
        '<button data-act="home-move" data-arg="'+id+'|down" title="Move down">↓</button></span>' : '';
    return '<div class="dwlibitem'+(off?' off':'')+'">'+
      '<div class="ic">'+w.icon+'</div>'+
      '<div class="lbl"><div class="t">'+esc(w.title)+'</div><div class="d">'+(off?'Hidden':(movable?'Shown':'Top strip'))+'</div></div>'+
      ctrls+
      '<button class="tog" data-act="home-toggle" data-arg="'+id+'">'+(off?'Show':'Hide')+'</button></div>';
  }
  var statRows = HOME_CARDS.filter(function(c){return c.slot==='stats';}).map(function(c){return row(c.id,false);}).join('');
  var bodyRows = st.order.map(function(id){ return row(id,true); }).join('');

    '<div class="custlbl">Cards</div><div class="custlist">'+bodyRows+'</div></div></div>';

function homeMove_(id, dir){
  var st=homeState();

  var tmp=st.order[i]; st.order[i]=st.order[j]; st.order[j]=tmp;
  homeSave(st); renderDash();
}

function renderEnvelopes(){

/* ============================ inbox + splits ============================ */
function renderInbox(){
  if(state.inbox){ drawInbox(); if(freshEnough('inbox')) return; } // v3.27: warm+fresh → no network
  else { $('#shell').innerHTML = '<h2 class="viewtitle">Inbox</h2><div class="spin"></div>'; }
  run('apiGetInbox').then(function(rows){ // …refresh in background
    markFetched('inbox');
    rows = filterInbox(rows); // v3.32: hide rows whose write-back is in flight
    var changed = JSON.stringify(rows) !== JSON.stringify(state.inbox);
    state.inbox = rows;
    updateBadges(rows.length);
    if(state.view==='inbox' && (changed || !$('.txncard, .empty')) && !userBusy()) drawInbox();
  }).catch(function(e){ if(!state.inbox) fail(e); });
}
function drawInbox(){
  var h = '<div class="viewhead"><h2>Inbox</h2>'+
    '<button class="btn ghost sm" data-act="import-now"'+(state.importing?' disabled':'')+
    '>↻ Check for new</button></div>';
  if(!state.inbox.length){
    h += '<div class="empty">Inbox zero. Every transaction has a job.</div>';
    $('#shell').innerHTML = h; return;
  }
  // v3.6.2: two sections — auto-categorized (rule suggestion or hand-picked
  // envelope) with Approve all, and the rest that still need a category.
  var autoTs=[], otherTs=[];
  state.inbox.forEach(function(t){
    if(state.sel[t.txnId] || t.suggestedId) autoTs.push(t); else otherTs.push(t);
  });
  var readyN = autoTs.filter(approveAllEligible).length;
  if(autoTs.length){
    h += '<div class="grp"><h3 style="display:flex;justify-content:space-between;align-items:center">'+
      'Auto-categorized · '+autoTs.length+
      (readyN ? '<button class="btn sm" data-act="approve-all">✓ Approve all ('+readyN+')</button>' : '')+
      '</h3>';
    autoTs.forEach(function(t){ h += inboxCardHtml(t); });
    h += '</div>';
  }
  if(otherTs.length){
    h += '<div class="grp"><h3>Needs a category · '+otherTs.length+'</h3>';
    otherTs.forEach(function(t){ h += inboxCardHtml(t); });
    h += '</div>';
  }
  $('#shell').innerHTML = h;
}
/* Eligible for Approve all: has an envelope and isn't mid-split. v3.6.11:
   income is included — deposits approve into an income envelope (Regular Pay
   etc., the default suggestion). You then move income → the Income Cash Pool
   and fund envelopes from the pool on the Fund page. */
function approveAllEligible(t){
  var sp = state.split[t.txnId];
  if(sp && sp.on) return false;
  return !!(state.sel[t.txnId] || t.suggestedId);
}
function inboxCardHtml(t){
  var h = '';
  {
    var sp = state.split[t.txnId];
    var selId = state.sel[t.txnId] || t.suggestedId || '';
    h += '<div class="txncard">'+
      '<div class="top"><div class="desc">'+esc(t.description)+'</div>'+
      '<div class="amt '+(t.amount<0?'neg':'pos')+'">'+money(t.amount)+'</div></div>'+
      '<div class="meta">'+esc(t.date)+' · '+esc(t.account)+'</div>';
    if(sp && sp.on){
      h += splitEditorHtml(t.txnId, t.amount, sp.lines, 'inbox');
      h += '<div class="actions">'+
        '<button class="btn" '+(splitReady(t.amount, sp.lines)?'':'disabled')+
          ' data-act="approve-split" data-arg="'+esc(t.txnId)+'">Approve split</button>'+
        '<button class="btn ghost" data-act="split-off" data-arg="'+esc(t.txnId)+'">Cancel split</button>'+
        '</div>';
    } else {
      h += '<div class="pills">';
      if(t.suggestedId){
        var cls = 'pill' + (t.suggestedId===selId ? ' sel' : ' sugg');
        h += '<button class="'+cls+'" data-act="pick-sel" data-arg="'+esc(t.txnId)+'|'+esc(t.suggestedId)+'">'+
          (t.suggestedId===selId?'':'✨ ')+esc(t.suggestedName)+'</button>';
      }
      if(selId && selId!==t.suggestedId){
        h += '<button class="pill sel" data-act="open-picker" data-arg="sel|'+esc(t.txnId)+'">'+
          esc(envName(selId))+'</button>';
      }
      h += '<button class="pill" data-act="open-picker" data-arg="sel|'+esc(t.txnId)+'">Choose envelope…</button>'+
        '<button class="pill" data-act="split-on" data-arg="'+esc(t.txnId)+'">Split…</button>';
      // v3.6.9: no per-txn funding — deposits are approved into the Income
      // Cash Pool like everything else; funding happens on the Fund page.
      h += '</div><div class="actions">'+
        '<button class="btn" '+(selId?'':'disabled')+' data-act="approve" data-arg="'+esc(t.txnId)+'">Approve</button>'+
        '<label class="rulechk"><input type="checkbox" id="rule-'+cssId(t.txnId)+'"> Always suggest this</label>'+
        '</div>';
    }
    h += '</div>';
  }
  return h;
}
function approveAll(){
  var items = state.inbox.filter(approveAllEligible).map(function(t){
    return { txnId: t.txnId, key: t.key, envelopeId: state.sel[t.txnId] || t.suggestedId };
  });
  if(!items.length){ toast('Nothing ready to approve'); return; }
  confirmUi('Approve '+items.length+' transaction'+(items.length===1?'':'s')+
    ' into their suggested envelopes? Each stays individually undoable from History.', 'Approve all')
  .then(function(ok){
    if(!ok) return;
    busyButtons(true);
    toast('Approving '+items.length+'…'); // v3.29.1: immediate feedback
    run('apiApproveBatch', items).then(function(r){
      var doneIds = {};
      r.results.forEach(function(x){ if(!x.error) doneIds[x.txnId]=1; });
      markPendingApproved(items.filter(function(it){ return doneIds[it.txnId]; })
        .map(function(it){ return it.key || it.txnId; })); // v3.32
      state.inbox = state.inbox.filter(function(t){ return !doneIds[t.txnId]; });
      Object.keys(doneIds).forEach(function(id){ delete state.sel[id]; delete state.split[id]; });
      invalidateData();
      updateBadges(state.inbox.length);
      refreshBoot();
      drawInbox();
      var failed = r.results.length - r.approved;
      var msg = 'Approved '+r.approved+' ✓';
      if(failed) msg += ' · '+failed+' failed (still in inbox)';
      if(r.tillerWrite && r.tillerWrite.queued) msg += ' · syncing '+r.tillerWrite.queued+' to Tiller in background'; // v3.23
      else if(r.tillerWrite && r.tillerWrite.written) msg += ' · Tiller ✓';
      toast(msg);
    }).catch(function(e){ toast('⚠ '+(e.message||e)); drawInbox(); });
  });
}
function cssId(s){ return String(s).replace(/[^a-zA-Z0-9_-]/g,'_'); }

/* shared split editor (inbox + resplit + fund legs use the same line model) */
function splitEditorHtml(key, total, lines, kind){
  var sum = 0;
  var h = '<div class="splitbox">';
  lines.forEach(function(l,i){
    sum += cents(splitAmt(total, l.amount));
    h += '<div class="splitline">'+
      '<button class="envbtn'+(l.envelopeId?'':' unset')+'" data-act="open-picker" data-arg="'+
        kind+'line|'+esc(key)+'|'+i+'">'+(l.envelopeId?esc(envName(l.envelopeId)):'Pick envelope…')+'</button>'+
      '<input type="number" step="0.01" inputmode="decimal" value="'+(l.amount!==''?l.amount:'')+
        '" data-act="split-amt" data-arg="'+kind+'|'+esc(key)+'|'+i+'" placeholder="0.00">'+
      '<button class="rm" data-act="split-rm" data-arg="'+kind+'|'+esc(key)+'|'+i+'">✕</button>'+
      '</div>';
  });
  var left = cents(total)-sum;
  h += '<div class="splitfoot">'+
    '<button class="addline" data-act="split-add" data-arg="'+kind+'|'+esc(key)+'">+ Add envelope</button>'+
    '<span class="left'+(left!==0?' bad':'')+'">'+(left===0?'Fully assigned ✓':'Remaining: '+money(Math.abs(left)/100))+'</span>'+
    '</div></div>';
  return h;
}
/* v3.6.3: split amounts are typed WITHOUT a sign — the transaction's sign
   is applied automatically (a $-408 spend split as 204/204 means -204/-204).
   Typing a minus anyway still works (abs first). */
function splitAmt(total, v){
  var n = Math.abs(Number(v)||0);
  return Number(total)<0 ? -n : n;
}
function splitReady(total, lines){
  if(!lines.length) return false;
  var sum=0;
  for(var i=0;i<lines.length;i++){
    if(!lines[i].envelopeId || cents(splitAmt(total, lines[i].amount))===0) return false;
    sum += cents(splitAmt(total, lines[i].amount));
  }
  return sum===cents(total);
}
function splitLinesOf(kind, key){
  if(kind==='inbox') return (state.split[key]=state.split[key]||{on:true,lines:[]}).lines;
  if(kind==='resplit') return (state.resplit[key]=state.resplit[key]||[]);
  if(kind==='fund') return (state.fund[key]=state.fund[key]||{legs:[]}).legs;
  return [];
}
function redrawFor(kind){
  if(kind==='inbox') drawInbox();
  else if(kind==='resplit') drawTxns();
  else if(kind==='fund') drawFund();
}

/* approve (single + split) */
function approve(txnId){
  var t = state.inbox.find(function(x){ return x.txnId===txnId; });
  var envId = state.sel[txnId] || (t&&t.suggestedId);
  if(!envId || !t) return;
  var ruleEl = $('#rule-'+cssId(txnId));
  var createRule = ruleEl && ruleEl.checked ? t.description : null;
  busyButtons(true);
  approvePending_(txnId);
  run('apiApprove', { txnId:txnId, key:t.key, envelopeId:envId, createRule:createRule })
    .then(afterApprove(txnId, t.key)).catch(approveErr);
}
/* v3.29.1: immediate feedback — an approve takes the server 3-4s and the old
   flow showed NOTHING until the final toast. Now the clicked button says so
   and a toast fires right away. (True instant approvals = Phase 2.) */
function approvePending_(txnId){
  toast('Approving…');
  $all('.txncard button').forEach(function(b){
    if(b.getAttribute('data-arg')!==txnId) return;
    var a = b.getAttribute('data-act');
    if(a==='approve' || a==='approve-split'){ b.textContent='Approving…'; }
  });
}
function approveSplit(txnId){
  var sp = state.split[txnId];
  var t = state.inbox.find(function(x){ return x.txnId===txnId; });
  if(!sp || !t || !splitReady(t.amount, sp.lines)) return;
  busyButtons(true);
  approvePending_(txnId);
  run('apiApprove', { txnId:txnId, key:t.key,
    splits: sp.lines.map(function(l){ return {envelopeId:l.envelopeId, amount:splitAmt(t.amount, l.amount)}; }) })
    .then(afterApprove(txnId, t.key)).catch(approveErr);
}
function afterApprove(txnId, key){
  return function(r){
    markPendingApproved([key || txnId]); // v3.32: hide from refetches until write-back lands
    toast(tillerNote('Approved ✓', r));
    state.inbox = state.inbox.filter(function(x){ return x.txnId!==txnId; });
    delete state.sel[txnId]; delete state.split[txnId];
    invalidateData();
    updateBadges(state.inbox.length);

    drawInbox();

}
function approveErr(e){ toast('⚠ '+(e.message||e)); drawInbox(); }
function busyButtons(b){ $all('.txncard .btn').forEach(function(x){ x.disabled=b; }); }

/* Enter approves the first card with a selection/suggestion.
   v3.22: pick the first card AS RENDERED — drawInbox lists "Auto-categorized"
   before "Needs a category", so state.inbox[0] could be a different card than
   the one at the top of the screen. */
document.addEventListener('keydown', function(ev){
  if(ev.key!=='Enter' || state.view!=='inbox' || !state.inbox || !state.inbox.length) return;
  if(/INPUT|TEXTAREA|SELECT/.test(document.activeElement.tagName)) return;
  var t = state.inbox.find(function(x){ return state.sel[x.txnId] || x.suggestedId; }) || state.inbox[0];
  if(state.split[t.txnId] && state.split[t.txnId].on) approveSplit(t.txnId);

/* ============================ fund view (v3.6.9: pool-driven) ============================
 * Income is approved into the Income Cash Pool like any other transaction;
 * this view moves pool money into envelopes ("put the money to work"). */
function renderFund(){
  $('#shell').innerHTML = '<h2 class="viewtitle">Fund</h2><div class="spin"></div>';
  Promise.all([
    state.plans ? Promise.resolve(state.plans) : run('apiPlans'),
    state.inbox ? Promise.resolve(state.inbox) : run('apiGetInbox')
  ]).then(function(res){
    state.plans = res[0]; state.inbox = res[1];
    updateBadges(state.inbox.length);
    drawFund();
  }).catch(fail);
}
function poolBalance(){
  var b = state.boot, bal = 0;
  b.groups.forEach(function(g){ g.envelopes.forEach(function(e){
    if(e.id===b.incomePoolId) bal = e.balance;
  });});
  return bal;
}
function drawFund(){
  var bal = poolBalance();
  var deposits = (state.inbox||[]).filter(function(t){ return t.amount>0 && t.cashAccount===true; });
  var activePlans = (state.plans||[]).filter(function(p){ return p.active && !isPlanVersion(p); });

  var h = '<h2 class="viewtitle">Fund</h2>';
  h += '<div class="txncard"><div class="top"><div class="desc">Income Cash Pool</div>'+
    '<div class="amt'+(bal>0?' pos':'')+'">'+money(bal)+'</div></div>'+
    '<div class="meta">money waiting to be put to work</div>';
  if(deposits.length){
    h += '<div class="meta" style="margin-top:4px">⚠ '+deposits.length+' deposit'+
      (deposits.length===1?'':'s')+' waiting in the Inbox — approve into an income envelope, then move it here to the pool.</div>';
  }
  if(bal<=0){
    h += '</div><div class="empty">Nothing to fund yet. Approve deposits into the pool, then put the money to work below.</div>';
  } else {
    h += '<div class="formrow" style="margin-top:12px"><label>Amount to fund'+
      '<span style="color:var(--ink-3);font-weight:500"> · pool has '+money(bal)+'</span></label>'+
      '<input type="number" step="0.01" inputmode="decimal" id="fundAmt" value="'+esc(f?f.amount:bal)+'"'+
      (f?' data-act="fund-amt" data-arg="pool"':'')+'></div>';
    h += '<div class="pills">';
    activePlans.forEach(function(p){
      h += '<button class="pill'+(f&&f.planId===p.planId?' sel':'')+

    });
    h += '<button class="pill'+(f&&!f.planId?' sel':'')+'" data-act="fund-manual" data-arg="pool">Manual split</button></div>';
    if(f){
      h += splitEditorHtml('pool', f.amount, f.legs, 'fund');
      h += '<div class="actions">'+
        '<button class="btn" '+(splitReady(f.amount, f.legs)?'':'disabled')+
        ' data-act="fund-go" data-arg="pool">Fund '+money(f.amount)+'</button>'+
        '<button class="btn ghost" data-act="fund-cancel" data-arg="pool">Cancel</button></div>';
    }

function fundStart(key, planId){
  var amtEl = $('#fundAmt');
  var amount = Number(amtEl && amtEl.value) || poolBalance();
  if(!(amount>0)){ toast('Enter a positive amount'); return; }
  if(planId){
    run('apiPreviewPlan', planId, amount).then(function(p){
      // Use the plan's own total as the amount so it's immediately consistent
      // (a fixed plan asks for its fixed total regardless of what was typed).
      var legSum = p.legs.reduce(function(s,l){ return s + Number(l.amount||0); }, 0);
      var amt = legSum>0 ? legSum : amount;
      state.fund['pool'] = { amount: amt, planId: planId,
        legs: p.legs.map(function(l){ return {envelopeId:l.envelopeId, amount:l.amount}; }) };
      if(legSum > poolBalance()+0.005){
        toast('Plan totals '+money(legSum)+' but the pool has '+money(poolBalance())+
          ' — lower the amount or trim envelopes below.');
      }
      drawFund();
    }).catch(function(e){ toast('⚠ '+(e.message||e)); });
  } else {
    state.fund['pool'] = { amount: amount, planId:'', legs:[{envelopeId:'', amount:''}] };
    drawFund();
  }
}
function fundGo(){
  var f = state.fund['pool'];
  if(!f || !splitReady(f.amount, f.legs)) return;
  busyButtons(true);
  run('apiFundFromPool', { amount: Number(f.amount), planId: f.planId||null,
    legs: f.legs.map(function(l){ return {envelopeId:l.envelopeId, amount:splitAmt(f.amount, l.amount)}; }) })
  .then(function(){
    toast('Funded ✓');
    delete state.fund['pool'];
    invalidateData();
    return refreshBoot();
  }).then(function(){ if(state.view==='fund') drawFund(); })
  .catch(function(e){ toast('⚠ '+(e.message||e)); drawFund(); });
}
/* Live-update the pool-fund "Remaining" + Fund button as the amount or legs
   change, WITHOUT a full redraw (keeps the input focused). The pool fund's
   target is the typed amount (state.fund.amount), not an Inbox transaction. */
function fundRecompute(key){
  var f = state.fund[key]; if(!f) return;
  var sum=0; f.legs.forEach(function(l){ sum += cents(splitAmt(f.amount, l.amount)); });
  var left = cents(f.amount) - sum;
  var lf = document.querySelector('.splitfoot .left');
  if(lf){ lf.textContent = left===0?'Fully assigned ✓':'Remaining: '+money(Math.abs(left)/100);
    lf.classList.toggle('bad', left!==0); }
  var btn = document.querySelector('[data-act="fund-go"]');
  if(btn){ btn.disabled = !splitReady(f.amount, f.legs);
    btn.textContent = 'Fund '+money(Number(f.amount)||0); }
}

/* ============================ transactions ============================ */
function renderTxns(keepList){
  var r = state.register;
  if(!r.limit) r.limit = 50;
  // v3.28.1: limit is part of the sig so "Show more" (a bigger page) is a cache miss.
  var sig = r.q+'|'+r.account+'|'+r.envelope+'|'+(r.includeHidden?'1':'0')+'|'+r.limit;
  var cached = r.items && r.sig===sig;
  if(cached){ drawTxns(); if(freshEnough('register')) return; } // v3.27: warm+fresh → no network
  else if(keepList && r.items){ drawTxns(); } // v3.28.1: keep current rows visible while a bigger page loads
  else { $('#shell').innerHTML = '<h2 class="viewtitle">Transactions</h2><div class="spin"></div>'; }
  Promise.all([
    run('apiRegister', { q:r.q, account:r.account, envelope:r.envelope,
      includeHidden:r.includeHidden, limit:r.limit }),
    state.accounts ? Promise.resolve(state.accounts) : run('apiAccounts')
  ]).then(function(res){
    // v3.22: discard OUT-OF-ORDER responses — two quick filter changes could
    // resolve in reverse order, and the older result then overwrote the newer
    // one while its sig marked it "current" for the wrong filters.
    var curSig = r.q+'|'+r.account+'|'+r.envelope+'|'+(r.includeHidden?'1':'0')+'|'+r.limit;
    if(curSig !== sig){ state.accounts = res[1]; return; }
    markFetched('register');
    var changed = JSON.stringify(res[0]) !== JSON.stringify(r.items);
    r.items = res[0]; r.sig = sig;
    state.accounts = res[1];
    if(state.view==='txns' && (!cached || (changed && !userBusy()))) drawTxns();
  }).catch(function(e){ if(!cached) fail(e); });
}

/* v3.29.1: "Show all" froze the tab for minutes — 9k+ rows were stringified and
   parsed into the DOM in ONE innerHTML write. Now the first RENDER_CHUNK rows
   paint immediately and the rest stream in batches on setTimeout(0), with a
   live count. A generation token abandons the stream if the user re-renders
   (filter/search/navigation) mid-stream. */
var RENDER_CHUNK = 400;
var drawTxnsGen_ = 0;
function drawTxns(){
  var gen = ++drawTxnsGen_;
  var r = state.register;
  var h = '<h2 class="viewtitle">Transactions</h2>'+
    '<div class="searchbar"><input id="regQ" placeholder="Search description…" value="'+esc(r.q)+'">'+
    '<button class="btn sm" data-act="reg-search">Search</button></div>'+
    '<div class="filterbar">'+
    '<select id="regAcct" data-act="reg-acct"><option value="">All accounts</option>'+
    (state.accounts||[]).map(function(a){
      return '<option value="'+esc(a)+'"'+(r.account===a?' selected':'')+'>'+esc(a)+'</option>';
    }).join('')+'</select>'+
    (r.envelope
      ? '<button class="pill sel" data-act="reg-env-clear">'+esc(envName(r.envelope))+' ✕</button>'
      : '<button class="pill" data-act="open-picker" data-arg="regenv|x|0">Filter by envelope…</button>')+
    '<button class="pill'+(r.includeHidden?' sel':'')+'" data-act="reg-hidden">'+
      (r.includeHidden?'Hidden shown ✕':'Show hidden')+'</button>'+
    ((r.q||r.account||r.envelope)?'<button class="pill" data-act="reg-clear">Clear all</button>':'')+
    '</div>';
  var items = r.items || [];
  // v3.28.1: on desktop, the Midpoint/Compact density presets show the register as
  // single-line rows (date · desc · account · envelope · ⋮ · amount). Comfortable
  // and phone keep the roomy stacked cards.
  var oneLine = (state.density==='mid' || state.density==='compact') && window.innerWidth>=900;
  var rowFn = oneLine ? txnRowOneLine : txnRowCard;
  var firstN = Math.min(items.length, RENDER_CHUNK);
  if(!items.length){
    h += '<div class="empty">'+((r.q||r.account||r.envelope)?'No matches.':'No approved transactions yet.')+'</div>';
  } else {
    h += oneLine
      ? '<div class="card regtable" id="regList">'+
        '<div class="rrow rhead"><span>Date</span><span>Description</span><span>Account</span>'+
        '<span>Envelope</span><span></span><span class="ramt">Amount</span></div>'
      : '<div class="card" id="regList">';
    for(var ri=0; ri<firstN; ri++) h += rowFn(items[ri]);
    h += '</div>';
  }
  // v3.28.1: paging. The backend returns the newest `limit` txns; if we got a full
  // page there are probably more, so offer "Show more" / "Show all". No hard cap —
  // this is Scott's primary app, so all history must be reachable.
  if(items.length){
    var more = items.length >= (r.limit||50);
    h += '<div class="regmore">';
    if(more){
      h += '<div class="regmore-btns">'+
        '<button class="btn ghost" data-act="reg-more">Show 100 more</button>'+
        '<button class="btn ghost" data-act="reg-all">Show all</button></div>';
    }
    h += '<div class="regcount" id="regCount">'+(more?('Showing '+items.length):('Showing all '+items.length))+
      ' transaction'+(items.length===1?'':'s')+'</div>';
    h += '</div>';
  }
  $('#shell').innerHTML = h;
  // stream the rest in chunks (only kicks in past RENDER_CHUNK rows)
  if(items.length > firstN){
    var idx = firstN;
    (function step(){
      if(gen !== drawTxnsGen_) return;            // superseded by a newer render
      var list = $('#regList'), cnt = $('#regCount');
      if(!list) return;                            // view torn down
      var end = Math.min(idx + RENDER_CHUNK, items.length), buf = '';
      for(; idx<end; idx++) buf += rowFn(items[idx]);
      list.insertAdjacentHTML('beforeend', buf);
      if(idx < items.length){
        if(cnt) cnt.textContent = 'Rendering '+idx.toLocaleString()+' of '+items.length.toLocaleString()+'…';
        setTimeout(step, 0);
      } else if(cnt){
        cnt.textContent = (items.length >= (r.limit||50) ? 'Showing ' : 'Showing all ')+
          items.length.toLocaleString()+' transactions';
      }
    })();
  }
  var q = $('#regQ');
  if(q) q.addEventListener('keydown', function(ev){
    if(ev.key==='Enter'){ state.register.q=q.value; renderTxns(); }
  });
}
function resplitGo(txnId){
  var lines = state.resplit[txnId];
  var t = (state.register.items||[]).find(function(x){ return x.txnId===txnId; });
  var total = t ? t.amount : 0; // 0 → splitAmt keeps positive (won't flip sign)
  var splits = lines.map(function(l){ return {envelopeId:l.envelopeId, amount:splitAmt(total, l.amount)}; });
  // v3.27 OPTIMISTIC: patch the row's legs and close the editor NOW; the save
  // runs in the background (rollback + reopen the editor on failure). The old
  // flow gave no feedback for ~4s, then invalidateData()+renderTxns() tore the
  // list down to a spinner and refetched for ~4s more — Scott's 7/13 complaint.
  var prevLegs = t ? t.legs : null;
  if(t) t.legs = splits.map(function(s){
    return { envelopeId:s.envelopeId, envelopeName:envName(s.envelopeId), amount:s.amount };
  });
  delete state.resplit[txnId];
  if(state.view==='txns') drawTxns();
  toast('Saving split…');
  // v3.22: send the stable Txn Key — reused Tiller IDs previously re-split BOTH txns
  run('apiResplit', { txnId:txnId, key:(t&&t.key)||'', splits:splits })
  .then(function(){
    toast('Split saved ✓');
    invalidateData();
    refreshBoot();
  }).catch(function(e){
    if(t && prevLegs) t.legs = prevLegs;
    state.resplit[txnId] = lines;
    if(state.view==='txns') drawTxns();
    toast('⚠ Split failed: '+(e.message||e));
  });
}
function unapprove(txnId){
  confirmUi('Send this transaction back to the Inbox? Its envelope balance(s) will be restored.', 'Un-approve')
  .then(function(ok){
    if(!ok) return;
    // v3.22: send the stable Txn Key — reused Tiller IDs previously collapsed
    // two unrelated transactions into one Inbox row
    var t = (state.register.items||[]).find(function(x){ return x.txnId===txnId; });
    // v3.27 OPTIMISTIC: drop the row and redraw now; restore it on failure.
    var idx = t ? state.register.items.indexOf(t) : -1;
    if(idx > -1) state.register.items.splice(idx, 1);
    if(state.view==='txns') drawTxns();
    toast('Sending back to Inbox…');
    run('apiUnapprove', txnId, (t&&t.key)||'').then(function(){
      toast('Back to Inbox ✓');
      state.inbox = null;
      invalidateData();
      refreshBoot();
    }).catch(function(e){
      if(t && idx > -1) state.register.items.splice(idx, 0, t);
      if(state.view==='txns') drawTxns();
      toast('⚠ Un-approve failed: '+(e.message||e));
    });
  });
}

function drawAccounts(){

    h += '<div class="empty">No accounts found yet.</div>';
  } else {
    h += '<div class="card">';
    rows.forEach(function(a){
      var meta = [a.klass, a.group].filter(String).join(' · ');
      h += '<div class="envrow"'+(a.hidden?' style="opacity:.55"':'')+'><div style="flex:1;min-width:0">'+
        '<div class="nm" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(a.name)+'</div>'+
        '<div style="color:var(--ink-3);font-size:12px;margin-top:1px">'+
        esc(meta || '')+(meta?' · ':'')+a.txnCount+' txns'+(a.lastTxn?' · last '+esc(a.lastTxn):'')+
        (a.tillerHide?' · hidden in Tiller':'')+'</div></div>'+
        '<button class="btn ghost sm" data-act="acct-toggle" data-arg="'+esc(a.name)+'">'+
        (a.hidden?'Show':'Hide')+'</button></div>';
    });
    h += '</div>';
  }
  $('#shell').innerHTML = h;
}
function acctToggle(name){
  var rows = (state.accountsFull && state.accountsFull.accounts) || [];
  var a = rows.find(function(x){ return x.name===name; });
  if(!a) return;
  a.hidden = !a.hidden; // optimistic
  drawAccounts();
  run('apiSetAccountHidden', { name:name, hidden:a.hidden })
  .then(function(){
    toast(a.hidden ? 'Hidden — won’t show in Transactions' : 'Visible again ✓');
    state.register.sig = null; // register must refetch with new hidden set
  }).catch(function(e){
    a.hidden = !a.hidden;
    drawAccounts();
    toast('⚠ '+(e.message||e));
  });
}

function balGroupHtml(g){

    h += '<span class="v">'+money(g.total)+'</span>';
  }
  h += '</div>';
  if(!state.balReorder){
    g.rows.forEach(function(r){

      h += '<div class="balrow'+(stale?' stale':'')+'">'+
        '<span class="nm">'+esc(r.name)+(r.manual?' <span style="font-size:10px;opacity:.55">manual</span>':'')+'</span>'+

      if(state.balEdit===r.name){

          '<input id="balEditInput" class="amt" style="flex:1" inputmode="decimal" value="'+esc(r.balance)+'">'+
          '<button class="btn sm" data-act="bal-edit-save" data-arg="'+esc(r.name)+'">Save</button>'+
          '<button class="btn ghost sm" data-act="bal-edit-cancel">Cancel</button></div>';
      }
    });
  } else {
    // reorder mode: list accounts with up/down so they can be ordered within the group
    g.rows.forEach(function(r){
      h += '<div class="balrow">'+
        '<span class="nm">'+esc(r.name)+'</span>'+
        '<span style="display:flex;gap:6px">'+
        '<button class="btn sm" style="background:rgba(13,148,136,.12);padding:2px 9px" data-act="bal-acct-up" data-arg="'+esc(g.name)+'|'+esc(r.name)+'">↑</button>'+
        '<button class="btn sm" style="background:rgba(13,148,136,.12);padding:2px 9px" data-act="bal-acct-down" data-arg="'+esc(g.name)+'|'+esc(r.name)+'">↓</button>'+
        '</span></div>';
    });
  }
  return h+'</div>';
}
function balMove(name, dir){
  var gs = state.balances.groups;
  var i = -1;
  gs.forEach(function(g,idx){ if(g.name===name) i=idx; });
  if(i===-1) return;
  // move among groups in the SAME column (asset vs liability)
  var sibs = [];
  gs.forEach(function(g,idx){ if(g.liability===gs[i].liability) sibs.push(idx); });
  var pos = sibs.indexOf(i);
  var tgt = pos + dir;
  if(tgt<0 || tgt>=sibs.length) return;
  var j = sibs[tgt];
  var tmp = gs[i]; gs[i]=gs[j]; gs[j]=tmp;
  drawBalances();
}
function balMoveAccount(groupName, acctName, dir){
  var g = (state.balances.groups||[]).find(function(x){ return x.name===groupName; });
  if(!g) return;
  var i = -1;
  g.rows.forEach(function(r,idx){ if(r.name===acctName) i=idx; });
  var j = i + dir;
  if(i===-1 || j<0 || j>=g.rows.length) return;
  var tmp = g.rows[i]; g.rows[i]=g.rows[j]; g.rows[j]=tmp;
  drawBalances();
}
function balSaveOrder(){
  var names = state.balances.groups.map(function(g){ return g.name; });
  var accts = [];
  state.balances.groups.forEach(function(g){ (g.rows||[]).forEach(function(r){ accts.push(r.name); }); });
  toast('Saving order…'); // v3.27: instant feedback (two chained mutations ≈ 5s)
  run('apiSetBalanceGroupOrder', names)
    .then(function(){ return run('apiSetBalanceAccountOrder', accts); })
    .then(function(){ toast('Order saved ✓'); })
    .catch(function(e){ toast('⚠ '+(e.message||e)); });
}
function balEdit(account){ state.balEdit = account; drawBalances();
  var el=$('#balEditInput'); if(el){ el.focus(); el.select(); } }
function balEditCancel(){ state.balEdit = null; drawBalances(); }
function balEditSave(account){
  var el=$('#balEditInput'); if(!el) return;
  var v=el.value; if(v===''||isNaN(Number(v))){ toast('Enter a number'); return; }
  var amt=Number(v);
  // v3.15.1: optimistic — patch the UI now, write to Tiller in the background
  // (the Tiller write + workbook recalc is the slow part; don't block on it).
  var prevRows=[];
  (state.balances.groups||[]).forEach(function(g){ (g.rows||[]).forEach(function(rr){
    if(rr.name===account){ prevRows.push({r:rr,balance:rr.balance,days:rr.days,updated:rr.updated});
      rr.balance = g.liability?Math.abs(amt):amt; rr.days=0; rr.updated='today'; } }); });
  state.balEdit=null; state.reconcile=null; invalidateData();
  drawBalances();
  toast('Saving '+account+' to Tiller…');
  run('apiManualBalance', { account:account, balance:amt }).then(function(){
    toast('✓ '+account+' updated · Tiller');
  }).catch(function(e){
    prevRows.forEach(function(p){ p.r.balance=p.balance; p.r.days=p.days; p.r.updated=p.updated; });
    state.reconcile=null; drawBalances();
    toast('⚠ Save failed: '+(e.message||e));
  });
}

      '<span style="color:var(--ink-3);font-size:12px">blank cells only · undoable from History</span></div>';
  }

  if(s.tillerDupIds !== undefined){
    var dupAll = s.tillerDupIds;
    var dupShown = state.showAllDups ? dupAll : dupAll.filter(function(r){ return r.complete===false; });
    var okN = dupAll.filter(function(r){ return r.complete!==false; }).length;
    var dupTitle = 'Shared Transaction IDs in Tiller (all-time)'+
      (s.tillerDupIdsIncomplete!==undefined?' — '+s.tillerDupIdsIncomplete+' need attention':'');
    h += syncSection(dupTitle, dupShown,
      state.showAllDups ? s.tillerDupIdsCount : (s.tillerDupIdsIncomplete||0), function(r){
      var verdict;
      if(r.complete===true){
        verdict = '<div class="meta" style="color:var(--green);font-weight:600">✓ All '+r.count+
          ' rows are in SBC ('+money(r.sbcTotal)+') — no action. Just never reuse this ID for new entries.</div>';
      } else if(r.complete===false){
        verdict = '<div class="meta" style="color:var(--amber);font-weight:600">⚠ Tiller has '+r.count+
          ' rows ('+money(r.total)+'), SBC has '+r.sbcRows+' ('+money(r.sbcTotal)+')'+
          (r.inInbox?' + 1 in Inbox':'')+
          '. Fix the missing Tiller rows: unique Transaction ID + today’s Date Added, then Check for new.</div>';
      } else {
        verdict = '<div class="meta" style="color:var(--amber);font-weight:600">'+
          'Give each Tiller row its own unique Transaction ID + today’s Date Added, then Check for new.</div>';
      }
      return '<div class="regrow"><div class="l1"><span class="desc">'+esc(r.description)+'</span>'+
        '<span class="amt">'+money(r.total)+' total</span></div>'+
        (r.account?'<div class="meta"><span class="acctchip">'+esc(r.account)+'</span></div>':'')+
        '<div class="meta">'+r.count+' rows share this ID: '+
        r.rows.map(function(x){ return esc(x.date)+' '+money(x.amount); }).join(' · ')+'</div>'+
        verdict+'</div>';
    }, state.showAllDups
        ? 'Every Transaction ID in Tiller is unique. (Copy-pasted manual rows would show here.)'
        : 'None need attention — all '+s.tillerDupIdsCount+' shared-ID clusters are fully in SBC ✓');
    if(okN>0){
      h += '<div class="actions" style="margin:-8px 4px 18px">'+
        '<button class="btn ghost sm" data-act="sync-dups-toggle">'+
        (state.showAllDups ? 'Hide the healthy clusters' : 'Show all '+s.tillerDupIdsCount+' clusters (incl. ✓ healthy)')+
        '</button></div>';
    }
  }

  if(s.catTabFound){
    h += syncSection('Envelopes missing from Tiller Categories', s.missingCats, s.missingCatsCount, function(r){
      return '<div class="regrow"><div class="l1"><span class="desc">'+esc(r.name)+'</span>'+
        '<span class="acctchip">'+esc(r.group||'')+'</span></div></div>';
    }, 'Every SBC envelope exists as a Tiller category.');
  } else {
    h += '<div class="empty">No "Categories" tab found in the Tiller sheet — skipped that check.</div>';
  }

  h += '<div class="empty" style="font-size:12.5px;padding-top:8px">Coming next: manual entries for '+
    'feed-less accounts, auto-categorize at approval, split mirroring, conflict resolver, and '+
    'Categories-tab upserts — all behind the Write Authorization gate.</div>';
  $('#shell').innerHTML = h;
}

/* v3.4: make SBC's copy of one transaction match Tiller's bank data.
   Envelope assignment is kept; balance adjusts by the difference; undoable
   from History. Writes only to the companion sheet. */
function acceptTiller(txnId){
  var item = ((state.sync&&state.sync.bankEdits)||[]).find(function(x){ return x.txnId===txnId; });
  var what = item ? '"'+item.description+'"\n'+item.changes.join('\n') : txnId;
  confirmUi('Update SBC to match Tiller?\n\n'+what+'\n\nEnvelope assignment is kept; undoable from History.', 'Accept')
  .then(function(ok){
    if(!ok) return;
    actBusy('accept-tiller', true, 'Updating…'); // v3.27: instant feedback
    run('apiAcceptTillerTxn', txnId).then(function(){
      toast('SBC updated to match Tiller ✓');
      invalidateData();
      state.inbox = null;
      refreshBoot();
      state.sync = null;
      if(state.view==='sync') renderSync();
    }).catch(function(e){ actBusy('accept-tiller', false); toast('⚠ '+(e.message||e)); });
  });
}
