<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>SBC Money</title>
<!-- iPhone home-screen icon (Apps Script can't set this; this launcher can) -->
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="SBC Money">
<meta name="theme-color" content="#0E9384">
<style>
html,body{height:100%;margin:0}
body{
  background:#0d3b36;color:#fff;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:18px;text-align:center;
  font:16px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
}
.name{font-size:26px;font-weight:800;letter-spacing:-.02em}
.name span{color:#5eead4}
a.btn{
  background:#0d9488;color:#fff;text-decoration:none;font-weight:700;
  border-radius:99px;padding:13px 30px;font-size:16px;margin-top:8px;
}
.hint{color:#9fc0bb;font-size:12.5px;max-width:300px}
.spin{width:22px;height:22px;border:3px solid rgba(255,255,255,.25);border-top-color:#fff;
  border-radius:50%;animation:sp 1s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<img src="icon-192.png" width="96" height="96" style="border-radius:22px" alt="SBC Money">
<div class="name">SBC <span>Money</span></div>
<div class="spin" id="spin"></div>
<div id="picker" style="display:none;flex-direction:column;align-items:center;gap:10px">
  <div class="hint">Which Google account do you use for SBC Money?</div>
  <input id="email" type="email" placeholder="you@theaubuchonfamily.com" autocomplete="email"
    style="padding:11px 14px;border-radius:10px;border:1px solid #2a6b62;background:#0a2e2a;color:#fff;font-size:16px;width:260px;text-align:center">
  <a class="btn" id="save" href="#">Save &amp; Open</a>
</div>
<a class="btn" id="open" href="#" style="display:none">Open SBC Money</a>
<div class="hint" id="hint">To install on your phone: open this page, tap Share → Add to Home Screen.</div>
<a href="?switch" id="switch" style="color:#5eead4;font-size:12.5px;display:none">Switch Google account</a>
<script>
/* ⬇️ PASTE YOUR WEB APP /exec URL BETWEEN THE QUOTES ⬇️ */
var APP_URL = 'https://script.google.com/a/macros/theaubuchonfamily.com/s/AKfycbyzvzQEx27XIohQybzhTj8jQE-x-TfjfnfEALjZ7DKpILJkVOl7DJNC-t-sBnbLkhxBcA/exec';
/* ⬆️ ------------------------------------------------ ⬆️ */
var KEY='sbc_account';
var saved=''; try{ saved=localStorage.getItem(KEY)||''; }catch(e){}
var qs=location.search;
var standalone = navigator.standalone===true ||
  (window.matchMedia && matchMedia('(display-mode: standalone)').matches);
/* ?setup only suppresses the redirect in a normal browser tab (for Add to
   Home Screen); launched FROM the home-screen icon it behaves like a launch */
var setup=qs.indexOf('setup')!==-1 && !standalone, switching=qs.indexOf('switch')!==-1;

/* Route through Google's account chooser pinned to the saved email, so the
   app always opens under the RIGHT account even when several are signed in. */
function urlFor(email){
  return email
    ? 'https://accounts.google.com/AccountChooser?Email='+encodeURIComponent(email)+'&continue='+encodeURIComponent(APP_URL)
    : APP_URL;
}
function show(id,on){ document.getElementById(id).style.display = on ? (id==='picker'?'flex':'') : 'none'; }

document.getElementById('open').href = urlFor(saved);
document.getElementById('save').onclick = function(ev){
  ev.preventDefault();
  var em=(document.getElementById('email').value||'').trim();
  if(em){ try{ localStorage.setItem(KEY,em); }catch(e){} }
  location.replace(urlFor(em));
};

if(!saved || switching || setup){
  /* first visit, ?setup, or ?switch → stay on page */
  show('spin',false); show('picker',true);
  if(saved) document.getElementById('email').value=saved;
  if(setup){ show('open',true); }
}else{
  show('switch',true);
  setTimeout(function(){ location.replace(urlFor(saved)); }, 400);
}
</script>
</body>
</html>
